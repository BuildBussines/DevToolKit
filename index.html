<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevToolKit Pro · Neon Developer Tools</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.7.6/dist/quagga.min.js">
    </script>
    <style>
        :root {
            --bg: #050510;
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-lime: #39ff14;
            --neon-yellow: #ffff00;
            --neon-orange: #ff6600;
            --card-bg: rgba(10, 10, 30, 0.8);
            --border: rgba(255, 255, 255, 0.15);
            --text: #e0e0ff;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at 50% 50%, #0a0a2e, #020210);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }
        #app {
            width: 100%;
            max-width: 960px;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            width: 100%;
            margin-top: 30px;
        }
        .cat-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
        }
        .cat-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px var(--neon-cyan), 0 0 60px rgba(255, 0, 255, 0.4);
        }
        .cat-card .icon {
            font-size: 3.5rem;
            filter: drop-shadow(0 0 10px var(--neon-cyan));
        }
        .cat-card h2 {
            margin: 10px 0 5px;
            font-size: 1.5rem;
            text-shadow: 0 0 8px var(--neon-cyan);
        }
        .cat-card p {
            font-size: 0.9rem;
            color: #aaa;
        }
        .back-btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            transition: 0.3s;
            text-shadow: 0 0 5px var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
        }
        .back-btn:hover {
            background: rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 25px var(--neon-cyan);
        }
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
            width: 100%;
        }
        .tool-item {
            background: rgba(20, 20, 40, 0.7);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .tool-item:hover {
            border-color: var(--neon-magenta);
            box-shadow: 0 0 20px var(--neon-magenta);
            transform: translateY(-3px);
        }
        .tool-item .emoji {
            font-size: 2rem;
            filter: drop-shadow(0 0 6px var(--neon-magenta));
        }
        .tool-item h3 {
            margin: 8px 0 4px;
            font-size: 1rem;
        }
        .detail-card {
            background: rgba(15, 15, 35, 0.8);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.2);
        }
        textarea,
        input,
        select {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-family: monospace;
            margin: 8px 0;
            outline: none;
            transition: 0.2s;
        }
        textarea:focus,
        input:focus,
        select:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        label {
            display: block;
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
            border: none;
            color: black;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            text-transform: uppercase;
        }
        button:hover {
            filter: brightness(1.2);
            transform: scale(1.03);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: none;
            transform: none;
        }
        .outline-btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: none;
            text-shadow: 0 0 5px var(--neon-cyan);
        }
        .danger-btn {
            background: transparent;
            border: 1px solid #ff073a;
            color: #ff073a;
            box-shadow: none;
            text-shadow: 0 0 5px #ff073a;
        }
        .output-box {
            background: black;
            border: 1px solid var(--neon-magenta);
            border-radius: 10px;
            padding: 16px;
            font-family: monospace;
            min-height: 80px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #ddd;
            margin: 10px 0;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
        }
        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .row>* {
            flex: 1;
            min-width: 80px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-magenta));
            color: black;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            z-index: 999;
            box-shadow: 0 0 20px var(--neon-cyan);
            animation: fadeOut 2.5s forwards;
        }
        @keyframes fadeOut {
            0% {
                opacity: 1;
            }
            70% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }
        .tab-bar {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: none;
            color: #aaa;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            border-radius: 0;
            box-shadow: none;
            text-transform: none;
            margin: 0;
            font-size: 0.85rem;
        }
        .tab-btn.active {
            background: rgba(0, 255, 255, 0.2);
            color: var(--neon-cyan);
            text-shadow: 0 0 8px var(--neon-cyan);
        }
        .speed-gauge {
            text-align: center;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 30px var(--neon-lime);
            color: var(--neon-lime);
            margin: 10px 0;
            min-height: 60px;
        }
        .speed-metric {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            min-width: 100px;
        }
        .speed-metric .val {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--neon-cyan);
        }
        .speed-metric .lbl {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .meter-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto;
        }
        .meter-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 12;
        }
        .meter-fill {
            fill: none;
            stroke: var(--neon-lime);
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s;
        }
        .meter-center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--neon-lime);
            text-shadow: 0 0 10px var(--neon-lime);
        }
        .time-display {
            font-size: 3.5rem;
            font-weight: 900;
            font-family: 'Courier New', monospace;
            text-align: center;
            letter-spacing: 4px;
            text-shadow: 0 0 25px var(--neon-lime);
            color: var(--neon-lime);
            margin: 10px 0;
            user-select: none;
        }
        .time-display.paused {
            text-shadow: 0 0 15px var(--neon-yellow);
            color: var(--neon-yellow);
        }
        .lap-list {
            max-height: 180px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .lap-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-family: monospace;
            font-size: 0.9rem;
        }
        .notes-list {
            max-height: 350px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .note-card {
            background: rgba(20, 20, 45, 0.7);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            margin: 8px 0;
            cursor: pointer;
            transition: 0.3s;
        }
        .note-card:hover {
            border-color: var(--neon-lime);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }
        .note-card.selected {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        .note-card h4 {
            margin: 0 0 4px;
            color: #fff;
            font-size: 1rem;
        }
        .note-card .note-date {
            font-size: 0.7rem;
            color: #666;
        }
        .note-card .note-preview {
            font-size: 0.8rem;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .converter-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .converter-row>div {
            flex: 1;
            min-width: 120px;
        }
        .swap-icon {
            cursor: pointer;
            font-size: 1.5rem;
            padding: 0 8px;
            transition: 0.3s;
            user-select: none;
            align-self: center;
        }
        .swap-icon:hover {
            transform: scale(1.3);
            filter: drop-shadow(0 0 8px var(--neon-cyan));
        }
        .result-badge {
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid var(--neon-cyan);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            margin: 10px 0;
            word-break: break-all;
        }
        #floatingTimer {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 30, 0.9);
            border: 1px solid var(--neon-cyan);
            border-radius: 12px;
            padding: 12px 18px;
            z-index: 1000;
            cursor: pointer;
            display: none;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            font-family: monospace;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--neon-lime);
            text-shadow: 0 0 10px var(--neon-lime);
            transition: transform 0.2s;
        }
        #floatingTimer:hover {
            transform: scale(1.05);
        }
        #floatingTimer.expired {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% {
                border-color: #ff073a;
                box-shadow: 0 0 20px #ff073a;
            }
            50% {
                border-color: var(--neon-yellow);
                box-shadow: 0 0 30px var(--neon-yellow);
            }
            100% {
                border-color: #ff073a;
                box-shadow: 0 0 20px #ff073a;
            }
        }
        .tts-note {
            font-size: 0.7rem;
            color: #ffaa00;
            background: rgba(255, 170, 0, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            border: 1px solid rgba(255, 170, 0, 0.3);
        }
        @media (max-width:600px) {
            .time-display {
                font-size: 2.2rem;
                letter-spacing: 2px;
            }
            .speed-gauge {
                font-size: 2rem;
            }
            .category-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .cat-card {
                padding: 18px;
            }
            .cat-card .icon {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="floatingTimer" title="Click to return to timer">⏳ 00:00:00</div>
    <div id="toastContainer"></div>

    <script>
        const app = document.getElementById('app');
        const floatingTimerEl = document.getElementById('floatingTimer');
        let audioCtx = null;

        function getAudioContext() {
            if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }

        function playBeep() {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch (e) {}
        }
        const globalTimer = {
            running: false,
            remaining: 0,
            total: 0,
            interval: null,
            beepInterval: null,
            expired: false,
            startTime: 0,
            pausedRemaining: 0
        };

        function stopBeeping() {
            if (globalTimer.beepInterval) {
                clearInterval(globalTimer.beepInterval);
                globalTimer.beepInterval = null;
            }
        }

        function startBeeping() {
            stopBeeping();
            playBeep();
            globalTimer.beepInterval = setInterval(playBeep, 1000);
        }

        function updateGlobalTimerDisplay() {
            if (!globalTimer.running) return;
            const now = performance.now();
            const newRemaining = globalTimer.pausedRemaining - (now - globalTimer.startTime);
            if (newRemaining <= 0) {
                globalTimer.remaining = 0;
                globalTimer.running = false;
                globalTimer.expired = true;
                clearInterval(globalTimer.interval);
                globalTimer.interval = null;
                startBeeping();
                updateFloatingTimer();
                if (document.getElementById('tmDisplay')) {
                    document.getElementById('tmDisplay').textContent = '00:00:00';
                    document.getElementById('tmStart').textContent = '▶ Start';
                    document.getElementById('tmPause').disabled = true;
                }
                return;
            }
            globalTimer.remaining = newRemaining;
            if (floatingTimerEl.style.display !== 'none') {
                floatingTimerEl.textContent = '⏳ ' + formatTimeMS(newRemaining);
                floatingTimerEl.classList.remove('expired');
            }
            if (document.getElementById('tmDisplay')) {
                document.getElementById('tmDisplay').textContent = formatTimeMS(newRemaining);
            }
        }

        function startGlobalTimer(durationMs) {
            stopGlobalTimer(false);
            globalTimer.total = durationMs;
            globalTimer.remaining = durationMs;
            globalTimer.pausedRemaining = durationMs;
            globalTimer.running = true;
            globalTimer.expired = false;
            globalTimer.startTime = performance.now();
            stopBeeping();
            globalTimer.interval = setInterval(updateGlobalTimerDisplay, 200);
            updateFloatingTimer();
        }

        function pauseGlobalTimer() {
            if (!globalTimer.running) return;
            const now = performance.now();
            globalTimer.pausedRemaining = globalTimer.remaining - (now - globalTimer.startTime);
            if (globalTimer.pausedRemaining < 0) globalTimer.pausedRemaining = 0;
            globalTimer.running = false;
            globalTimer.remaining = globalTimer.pausedRemaining;
            clearInterval(globalTimer.interval);
            globalTimer.interval = null;
            stopBeeping();
            updateFloatingTimer();
        }

        function resumeGlobalTimer() {
            if (globalTimer.running || globalTimer.expired || globalTimer.remaining <= 0) return;
            globalTimer.running = true;
            globalTimer.startTime = performance.now();
            globalTimer.pausedRemaining = globalTimer.remaining;
            stopBeeping();
            globalTimer.interval = setInterval(updateGlobalTimerDisplay, 200);
            updateFloatingTimer();
        }

        function stopGlobalTimer(reset = true) {
            globalTimer.running = false;
            clearInterval(globalTimer.interval);
            globalTimer.interval = null;
            stopBeeping();
            if (reset) {
                globalTimer.remaining = 0;
                globalTimer.total = 0;
                globalTimer.expired = false;
                globalTimer.pausedRemaining = 0;
            }
            updateFloatingTimer();
        }

        function formatTimeMS(ms) {
            if (ms < 0) ms = 0;
            const totalSec = Math.ceil(ms / 1000);
            const hrs = Math.floor(totalSec / 3600),
                mins = Math.floor((totalSec % 3600) / 60),
                secs = totalSec % 60;
            return `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
        }

        function updateFloatingTimer() {
            const currentViewIsTimer = document.getElementById('tmDisplay') !== null;
            if (globalTimer.running || globalTimer.expired) {
                if (!currentViewIsTimer) {
                    floatingTimerEl.style.display = 'block';
                    const timeStr = globalTimer.expired ? '00:00:00' : formatTimeMS(globalTimer.remaining);
                    floatingTimerEl.textContent = (globalTimer.expired ? '🔔 ' : '⏳ ') + timeStr;
                    floatingTimerEl.classList.toggle('expired', globalTimer.expired);
                } else {
                    floatingTimerEl.style.display = 'none';
                }
            } else {
                floatingTimerEl.style.display = 'none';
            }
        }
        floatingTimerEl.addEventListener('click', () => {
            renderTool('utilities', 'stopwatch');
            updateFloatingTimer();
        });

        const categories = [
            { id: 'text', icon: '📝', name: 'Text & Encode', desc: 'Encode, decode, generate text' },
            { id: 'design', icon: '🎨', name: 'CSS & Design',
            desc: 'Gradients, shadows, colors, flexbox' },
            { id: 'code', icon: '💻', name: 'Code Tools', desc: 'JSON, minifiers, regex, diff' },
            { id: 'security', icon: '🔐', name: 'Security', desc: 'Passwords, hashing' },
            { id: 'qrbarcode', icon: '📷', name: 'QR & Barcode',
                desc: 'Generate and read QR codes & barcodes' },
            { id: 'utilities', icon: '🔧', name: 'Utilities',
                desc: 'Speed test, stopwatch, notes, TTS, converter' }
        ];
        const tools = {
            text: [
                { id: 'base64', emoji: '🔐', title: 'Base64 Encoder/Decoder' },
                { id: 'urlencode', emoji: '🔗', title: 'URL Encoder/Decoder' },
                { id: 'wordcounter', emoji: '📊', title: 'Word & Character Counter' },
                { id: 'lorem', emoji: '📄', title: 'Lorem Ipsum Generator' },
                { id: 'uuid', emoji: '🆔', title: 'UUID Generator' }
            ],
            design: [
                { id: 'gradient', emoji: '🌈', title: 'Gradient Generator' },
                { id: 'boxshadow', emoji: '📦', title: 'Box Shadow Generator' },
                { id: 'colorpicker', emoji: '🎯', title: 'Color Picker & Convert' },
                { id: 'contrast', emoji: '⚫', title: 'Contrast Checker' },
                { id: 'flexbox', emoji: '📐', title: 'Flexbox Playground' },
                { id: 'colorplate', emoji: '🎨', title: 'Colour Plate' },
                { id: 'textformat', emoji: '✨', title: 'Text Format Chooser' }
            ],
            code: [
                { id: 'jsonfmt', emoji: '📋', title: 'JSON Formatter' },
                { id: 'cssmin', emoji: '🗜️', title: 'CSS Minifier' },
                { id: 'jsmin', emoji: '⚡', title: 'JavaScript Minifier' },
                { id: 'regex', emoji: '🔍', title: 'Regex Tester' },
                { id: 'diff', emoji: '🔄', title: 'Code Diff Checker' }
            ],
            security: [
                { id: 'password', emoji: '🔑', title: 'Password Generator' },
                { id: 'hash', emoji: '#️⃣', title: 'Hash Generator' }
            ],
            qrbarcode: [
                { id: 'qrgenerator', emoji: '📱', title: 'QR Code Generator' },
                { id: 'qrreader', emoji: '📸', title: 'QR Code Reader' },
                { id: 'barcodemaker', emoji: '🛒', title: 'Barcode Maker' },
                { id: 'barcodereader', emoji: '🔎', title: 'Barcode Reader' }
            ],
            utilities: [
                { id: 'speedtest', emoji: '🚀', title: 'Internet Speed Checker' },
                { id: 'stopwatch', emoji: '⏱️', title: 'Stopwatch & Timer' },
                { id: 'notes', emoji: '📝', title: 'Notes' },
                { id: 'tts', emoji: '🔊', title: 'Text to Speech' },
                { id: 'unitconverter', emoji: '📐', title: 'Unit Converter' }
            ]
        };

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function copyText(text) {
            if (!text || text.trim() === '') {
                showToast('⚠️ Nothing to copy');
                return;
            }
            navigator.clipboard.writeText(text).then(() => showToast('📋 Copied!'));
        }

        function renderHome() {
            app.innerHTML = `

        // ==================== RELIABLE SPEED TEST (FIXED) ====================
        function speedTestTool(c) {
            c.innerHTML = `
                <p style="text-align:center;color:#aaa;">Measure your internet connection speed</p>
                <div class="meter-container" style="margin:10px auto;">
                    <svg viewBox="0 0 160 160" style="transform:rotate(-90deg);">
                        <circle class="meter-bg" cx="80" cy="80" r="68" stroke-dasharray="427.3" stroke-dashoffset="0"/>
                        <circle id="meterFill" class="meter-fill" cx="80" cy="80" r="68" stroke-dasharray="427.3" stroke-dashoffset="427.3"/>
                    </svg>
                    <div class="meter-center-text" id="meterCenter">--</div>
                </div>
                <div class="speed-gauge" id="speedGauge">--</div>
                <p style="text-align:center;color:#888;font-size:0.8rem;" id="speedStatus">Ready</p>
                <div class="row" style="margin:12px 0;">
                    <div class="speed-metric"><div class="val" id="pingVal">--</div><div class="lbl">Ping (ms)</div></div>
                    <div class="speed-metric"><div class="val" id="dlVal">--</div><div class="lbl">Download (Mbps)</div></div>
                    <div class="speed-metric"><div class="val" id="ulVal">--</div><div class="lbl">Upload (Mbps)</div></div>
                </div>
                <div style="text-align:center;">
                    <button id="startSpeedTest">🚀 Start Speed Test</button>
                </div>
                <div id="speedError" style="color:#ff073a;text-align:center;margin-top:8px;display:none;"></div>
                <p style="color:#555;font-size:0.65rem;text-align:center;margin-top:8px;">
                    Uses Cloudflare & multiple fallback CDNs for reliable results.
                </p>
            `;

            const gauge = document.getElementById('speedGauge');
            const status = document.getElementById('speedStatus');
            const pingEl = document.getElementById('pingVal');
            const dlEl = document.getElementById('dlVal');
            const ulEl = document.getElementById('ulVal');
            const meterFill = document.getElementById('meterFill');
            const meterCenter = document.getElementById('meterCenter');
            const btn = document.getElementById('startSpeedTest');
            const errorDiv = document.getElementById('speedError');
            const MAX_SPEED = 150;
            const circumference = 2 * Math.PI * 68;

            function setMeter(speedMbps) {
                const percent = Math.min(Math.max(speedMbps / MAX_SPEED, 0), 1);
                meterFill.style.strokeDashoffset = circumference * (1 - percent);
                meterCenter.textContent = speedMbps ? speedMbps.toFixed(1) : '--';
            }

            function fetchWithTimeout(url, options = {}, timeoutMs = 15000) {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), timeoutMs);
                const fetchOptions = { ...options, signal: controller.signal };
                return fetch(url, fetchOptions).then(resp => {
                    clearTimeout(id);
                    return resp;
                }).catch(err => {
                    clearTimeout(id);
                    throw err;
                });
            }

            // Multiple download test URLs in order of preference
            const DOWNLOAD_URLS = [
                { url: 'https://speed.cloudflare.com/__down?bytes=500000', size: 500000,
                    name: 'Cloudflare' },
                { url: 'https://httpbin.org/bytes/524288', size: 524288, name: 'httpbin' },
                { url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/JPEG_example_flower_500px.jpg/500px-JPEG_example_flower_500px.jpg',
                    size: null, name: 'Wikimedia' },
                { url: 'https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png',
                    size: null, name: 'Google CDN' },
            ];

            // Multiple ping test URLs
            const PING_URLS = [
                'https://speed.cloudflare.com/__down?bytes=0',
                'https://httpbin.org/delay/0',
                'https://www.google.com/favicon.ico',
            ];

            // Multiple upload test URLs
            const UPLOAD_URLS = [
                { url: 'https://speed.cloudflare.com/__up', name: 'Cloudflare' },
                { url: 'https://httpbin.org/post', name: 'httpbin' },
            ];

            btn.addEventListener('click', async () => {
                btn.disabled = true;
                btn.textContent = '⏳ Testing...';
                gauge.textContent = '...';
                gauge.style.color = 'var(--neon-yellow)';
                status.textContent = 'Checking connectivity...';
                pingEl.textContent = '...';
                dlEl.textContent = '...';
                ulEl.textContent = '...';
                setMeter(0);
                errorDiv.style.display = 'none';

                // ---- Step 1: Connectivity check ----
                let online = false;
                for (const pingUrl of PING_URLS) {
                    try {
                        await fetchWithTimeout(pingUrl, { method: 'HEAD', cache: 'no-store' }, 5000);
                        online = true;
                        break;
                    } catch (e) {
                        continue;
                    }
                }
                if (!online) {
                    errorDiv.textContent =
                        '❌ No internet connection detected. All test servers are unreachable.';
                    errorDiv.style.display = 'block';
                    status.textContent = 'Failed';
                    gauge.textContent = 'ERR';
                    gauge.style.color = '#ff073a';
                    btn.disabled = false;
                    btn.textContent = '🚀 Retry';
                    return;
                }

                // ---- Step 2: Ping test ----
                status.textContent = 'Measuring ping...';
                let totalPing = 0;
                let pingCount = 0;
                for (const pingUrl of PING_URLS) {
                    for (let attempt = 0; attempt < 2; attempt++) {
                        try {
                            const start = performance.now();
                            await fetchWithTimeout(pingUrl, { method: 'HEAD', cache: 'no-store' },
                            5000);
                            totalPing += performance.now() - start;
                            pingCount++;
                            if (pingCount >= 4) break;
                        } catch (e) {
                            continue;
                        }
                    }
                    if (pingCount >= 4) break;
                }
                if (pingCount > 0) {
                    pingEl.textContent = Math.round(totalPing / pingCount);
                } else {
                    pingEl.textContent = 'N/A';
                }

                // ---- Step 3: Download test ----
                status.textContent = 'Testing download...';
                let dlMbps = null;
                let dlSourceUsed = '';
                for (const dlSource of DOWNLOAD_URLS) {
                    try {
                        status.textContent = `Download test (${dlSource.name})...`;
                        const dlStart = performance.now();
                        const response = await fetchWithTimeout(dlSource.url, { cache: 'no-store' },
                        20000);
                        const data = await response.arrayBuffer();
                        const dlEnd = performance.now();
                        const actualSize = data.byteLength;
                        if (actualSize < 1000) {
                            throw new Error('Downloaded data too small: ' + actualSize + ' bytes');
                        }
                        dlMbps = (actualSize * 8) / ((dlEnd - dlStart) / 1000) / 1000000;
                        dlSourceUsed = dlSource.name;
                        break;
                    } catch (e) {
                        console.warn(`Download source ${dlSource.name} failed:`, e.message);
                        continue;
                    }
                }
                if (dlMbps !== null) {
                    dlEl.textContent = dlMbps.toFixed(2);
                    gauge.textContent = dlMbps.toFixed(1);
                    gauge.style.color = 'var(--neon-lime)';
                    setMeter(dlMbps);
                    status.textContent = `✅ Download: ${dlSourceUsed}`;
                } else {
                    dlEl.textContent = 'N/A';
                    gauge.textContent = 'ERR';
                    gauge.style.color = '#ff073a';
                    setMeter(0);
                    status.textContent = 'Download failed';
                    errorDiv.textContent =
                        '⚠️ Download test failed on all servers. Upload test may still work.';
                    errorDiv.style.display = 'block';
                }

                // ---- Step 4: Upload test ----
                status.textContent = 'Testing upload...';
                let ulMbps = null;
                let ulSourceUsed = '';
                const payloadSize = 50 * 1024; // 50KB
                const payload = new Uint8Array(payloadSize);
                crypto.getRandomValues(payload);
                const blob = new Blob([payload]);
                for (const ulSource of UPLOAD_URLS) {
                    try {
                        status.textContent = `Upload test (${ulSource.name})...`;
                        const ulStart = performance.now();
                        await fetchWithTimeout(ulSource.url, {
                            method: 'POST',
                            body: blob,
                            cache: 'no-store',
                        }, 20000);
                        const ulEnd = performance.now();
                        ulMbps = (payloadSize * 8) / ((ulEnd - ulStart) / 1000) / 1000000;
                        ulSourceUsed = ulSource.name;
                        break;
                    } catch (e) {
                        console.warn(`Upload source ${ulSource.name} failed:`, e.message);
                        continue;
                    }
                }
                if (ulMbps !== null) {
                    ulEl.textContent = ulMbps.toFixed(2);
                    if (dlMbps === null) {
                        status.textContent = `✅ Upload: ${ulSourceUsed} (download failed)`;
                    } else {
                        status.textContent = `✅ Complete (DL:${dlSourceUsed} UL:${ulSourceUsed})`;
                    }
                } else {
                    ulEl.textContent = 'N/A';
                    if (dlMbps === null) {
                        status.textContent = 'All tests failed';
                    }
                }

                // ---- Finalize ----
                if (dlMbps === null && ulMbps === null) {
                    errorDiv.textContent =
                        '❌ All speed tests failed. Try again later or check your firewall/VPN settings.';
                    errorDiv.style.display = 'block';
                    gauge.textContent = 'ERR';
                    gauge.style.color = '#ff073a';
                }
                btn.disabled = false;
                btn.textContent = '🚀 Start Speed Test';
            });
        }

        // ---------- STOPWATCH & TIMER ----------
        function stopwatchTimerTool(c) {
            c.innerHTML = `
                <div class="tab-bar"><button class="tab-btn active" data-tab="sw">⏱️ Stopwatch</button><button class="tab-btn" data-tab="tm">⏰ Timer</button></div>
                <div id="swPanel">
                    <div class="time-display" id="swDisplay">00:00:00.00</div>
                    <div class="row" style="justify-content:center;"><button id="swStart">▶ Start</button><button id="swLap" class="outline-btn" disabled>🏁 Lap</button><button id="swReset" class="outline-btn">↺ Reset</button></div>
                    <div class="lap-list" id="lapList"></div>
                </div>
                <div id="tmPanel" style="display:none;">
                    <div class="time-display" id="tmDisplay">00:00:00</div>
                    <div class="row" style="justify-content:center;"><div><label>Hr</label><input type="number" id="tmHr" value="0" min="0" max="99" style="text-align:center;"></div><div><label>Min</label><input type="number" id="tmMin" value="5" min="0" max="59" style="text-align:center;"></div><div><label>Sec</label><input type="number" id="tmSec" value="0" min="0" max="59" style="text-align:center;"></div></div>
                    <div class="row" style="justify-content:center;margin-top:10px;"><button id="tmStart">▶ Start</button><button id="tmPause" class="outline-btn" disabled>⏸ Pause</button><button id="tmReset" class="outline-btn">↺ Reset</button></div>
                </div>`;
            c.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
                c.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('swPanel').style.display = btn.dataset.tab === 'sw' ? 'block' :
                    'none';
                document.getElementById('tmPanel').style.display = btn.dataset.tab === 'tm' ? 'block' :
                    'none';
            }));
            let swInterval = null,
                swRunning = false,
                swStartTime = 0,
                swElapsed = 0,
                lapCount = 0;
            const swDisplay = document.getElementById('swDisplay'),
                lapList = document.getElementById('lapList');
            const swStartBtn = document.getElementById('swStart'),
                swLapBtn = document.getElementById('swLap'),
                swResetBtn = document.getElementById('swReset');

            function formatSW(ms) {
                const cs = Math.floor(ms / 10) % 100,
                    s = Math.floor(ms / 1000) % 60,
                    m = Math.floor(ms / 60000) % 60,
                    h = Math.floor(ms / 3600000);
                return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
            }

            function updateSW() {
                const total = swElapsed + (swRunning ? performance.now() - swStartTime : 0);
                swDisplay.textContent = formatSW(total);
                swDisplay.classList.toggle('paused', !swRunning);
            }
            swStartBtn.addEventListener('click', () => {
                if (!swRunning) {
                    swRunning = true;
                    swStartTime = performance.now();
                    swStartBtn.textContent = '⏸ Stop';
                    swStartBtn.style.background = 'linear-gradient(135deg, #ff6600, #ff00ff)';
                    swLapBtn.disabled = false;
                    swInterval = setInterval(updateSW, 16);
                } else {
                    swRunning = false;
                    swElapsed += performance.now() - swStartTime;
                    swStartBtn.textContent = '▶ Start';
                    swStartBtn.style.background =
                        'linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta))';
                    swLapBtn.disabled = true;
                    clearInterval(swInterval);
                    swInterval = null;
                    updateSW();
                }
            });
            swLapBtn.addEventListener('click', () => {
                lapCount++;
                const total = swElapsed + (swRunning ? performance.now() - swStartTime : 0);
                const div = document.createElement('div');
                div.className = 'lap-item';
                div.innerHTML = `<span>Lap ${lapCount}</span><span>${formatSW(total)}</span>`;
                lapList.insertBefore(div, lapList.firstChild);
            });
            swResetBtn.addEventListener('click', () => {
                swRunning = false;
                swElapsed = 0;
                swStartTime = 0;
                lapCount = 0;
                clearInterval(swInterval);
                swInterval = null;
                swDisplay.textContent = '00:00:00.00';
                swDisplay.classList.remove('paused');
                swStartBtn.textContent = '▶ Start';
                swStartBtn.style.background =
                    'linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta))';
                swLapBtn.disabled = true;
                lapList.innerHTML = '';
            });
            const tmDisplay = document.getElementById('tmDisplay'),
                tmStartBtn = document.getElementById('tmStart');
            const tmPauseBtn = document.getElementById('tmPause'),
                tmResetBtn = document.getElementById('tmReset');
            const tmHr = document.getElementById('tmHr'),
                tmMin = document.getElementById('tmMin'),
                tmSec = document.getElementById('tmSec');

            function getTimerInputMs() {
                return ((parseInt(tmHr.value) || 0) * 3600 + (parseInt(tmMin.value) || 0) * 60 + (parseInt(tmSec
                    .value) || 0)) * 1000;
            }

            function updateTimerUI() {
                const rem = globalTimer.remaining;
                tmDisplay.textContent = formatTimeMS(rem);
                if (globalTimer.expired) {
                    tmDisplay.style.color = '#ff073a';
                    tmStartBtn.textContent = '▶ Start';
                    tmPauseBtn.disabled = true;
                } else if (globalTimer.running) {
                    tmDisplay.style.color = rem < 10000 ? '#ff6600' : 'var(--neon-lime)';
                    tmStartBtn.textContent = '⏸ Stop';
                    tmStartBtn.style.background = 'linear-gradient(135deg, #ff6600, #ff00ff)';
                    tmPauseBtn.disabled = false;
                } else {
                    tmDisplay.style.color = rem <= 0 ? 'var(--neon-lime)' : (rem < 10000 ? '#ff6600' :
                        'var(--neon-lime)');
                    tmStartBtn.textContent = '▶ Start';
                    tmStartBtn.style.background =
                        'linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta))';
                    tmPauseBtn.disabled = true;
                }
            }
            if (!globalTimer.running && !globalTimer.expired && globalTimer.remaining <= 0) {
                const ms = getTimerInputMs();
                globalTimer.remaining = ms;
                globalTimer.total = ms;
            }
            updateTimerUI();
            tmStartBtn.addEventListener('click', () => {
                if (globalTimer.running) { pauseGlobalTimer(); } else if (globalTimer.expired) {
                    stopGlobalTimer(true);
                    const ms = getTimerInputMs();
                    startGlobalTimer(ms);
                } else {
                    if (globalTimer.remaining <= 0) {
                        const ms = getTimerInputMs();
                        if (ms <= 0) { showToast('⚠️ Set a time'); return; }
                        startGlobalTimer(ms);
                    } else { resumeGlobalTimer(); }
                }
                updateTimerUI();
            });
            tmPauseBtn.addEventListener('click', () => { pauseGlobalTimer();
                updateTimerUI(); });
            tmResetBtn.addEventListener('click', () => {
                stopGlobalTimer(true);
                const ms = getTimerInputMs();
                globalTimer.remaining = ms;
                globalTimer.total = ms;
                globalTimer.expired = false;
                tmDisplay.textContent = formatTimeMS(ms);
                tmDisplay.style.color = 'var(--neon-lime)';
                tmStartBtn.textContent = '▶ Start';
                tmStartBtn.style.background =
                    'linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta))';
                tmPauseBtn.disabled = true;
                updateFloatingTimer();
            });
            ['tmHr', 'tmMin', 'tmSec'].forEach(id => document.getElementById(id).addEventListener('input', () => {
                if (!globalTimer.running && !globalTimer.expired) {
                    const ms = getTimerInputMs();
                    globalTimer.remaining = ms;
                    globalTimer.total = ms;
                    tmDisplay.textContent = formatTimeMS(ms);
                }
            }));
            let syncInterval = setInterval(() => {
                if (document.getElementById('tmDisplay')) updateTimerUI();
                else clearInterval(syncInterval);
            }, 500);
        }

        // ---------- NOTES ----------
        function notesTool(c) {
            function getNotes() {
                try { return JSON.parse(localStorage.getItem('devtoolkit_notes') || '[]'); } catch (e) { return []; }
            }

            function saveNotes(notes) { localStorage.setItem('devtoolkit_notes', JSON.stringify(notes)); }

                selectedId = null;

            function renderUI() {
                const list = document.getElementById('notesList'),
                    editor = document.getElementById('noteEditor');
                const title = document.getElementById('noteTitle'),
                    content = document.getElementById('noteContent');
                const date = document.getElementById('noteDate'),
                    del = document.getElementById('noteDelete');
                list.innerHTML = notes.length ? notes.sort((a, b) => b.updatedAt - a.updatedAt).map(n =>
                    `<div class="note-card ${n.id===selectedId?'selected':''}" data-id="${n.id}"><h4>${n.title||'Untitled'}</h4><div class="note-date">${new Date(n.updatedAt).toLocaleString()}</div><div class="note-preview">${n.content?n.content.slice(0,60):'Empty...'}</div></div>`
                ).join('') : '<p style="color:#666;padding:20px;">No notes yet.</p>';
                if (selectedId && notes.find(n => n.id === selectedId)) {
                    const n = notes.find(n => n.id === selectedId);
                    title.value = n.title;
                    content.value = n.content;
                    date.textContent = 'Updated: ' + new Date(n.updatedAt).toLocaleString();
                    editor.style.display = 'block';
                    del.style.display = 'inline-block';
                } else {
                    title.value = '';
                    content.value = '';
                    date.textContent = '';
                    editor.style.display = 'none';
                    del.style.display = 'none';
                }
            }
            c.innerHTML =
                `<div class="row"><button id="newNoteBtn">＋ New Note</button><button id="noteDelete" class="danger-btn" style="display:none;">🗑 Delete</button></div><div class="notes-list" id="notesList"></div><div id="noteEditor" style="display:none;"><label>Title</label><input id="noteTitle" placeholder="Title..."><label>Content</label><textarea id="noteContent" style="min-height:150px;"></textarea><p id="noteDate" style="color:#666;font-size:0.7rem;"></p><p style="color:#444;font-size:0.65rem;">✏️ Auto-saves</p></div>`;
            document.getElementById('newNoteBtn').onclick = () => {
                const newN = {
                    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 8),
                    title: '',
                    content: '',
                    createdAt: Date.now(),
                    updatedAt: Date.now()
                };
                notes.push(newN);
                selectedId = newN.id;
                saveNotes(notes);
                renderUI();
                document.getElementById('noteTitle').focus();
            };
            document.getElementById('noteDelete').onclick = () => {
                if (selectedId && confirm('Delete?')) {
                    notes = notes.filter(n => n.id !== selectedId);
                    selectedId = notes.length ? notes[notes.length - 1].id : null;
                    saveNotes(notes);
                    renderUI();
                }
            };
            document.getElementById('notesList').addEventListener('click', e => {
                const card = e.target.closest('.note-card');
                if (card) { selectedId = card.dataset.id;
                    renderUI(); }
            });
            document.getElementById('noteTitle').addEventListener('input', () => {
                const n = notes.find(n => n.id === selectedId);
                if (n) { n.title = document.getElementById('noteTitle').value;
                    n.updatedAt = Date.now();
                    saveNotes(notes); }
            });
            document.getElementById('noteContent').addEventListener('input', () => {
                const n = notes.find(n => n.id === selectedId);
                if (n) { n.content = document.getElementById('noteContent').value;
                    n.updatedAt = Date.now();
                    saveNotes(notes); }
            });
            if (notes.length && !selectedId) selectedId = notes.sort((a, b) => b.updatedAt - a.updatedAt)[0].id;
            renderUI();
        }

        // ---------- TTS ----------
        function ttsTool(c) {
            c.innerHTML = `
                <label>Text to speak</label>
                <textarea id="ttsText" style="min-height:130px;">Hello! This is the DevToolKit Pro text to speech tool.</textarea>
                <div class="row"><div><label>Voice</label><select id="ttsVoice"></select></div></div>
                <div class="row"><div><label>Rate: <span id="ttsRateVal">1.0</span>x</label><input type="range" id="ttsRate" min="0.1" max="3" step="0.1" value="1"></div><div><label>Pitch: <span id="ttsPitchVal">1.0</span></label><input type="range" id="ttsPitch" min="0.1" max="2" step="0.1" value="1"></div></div>
                <div class="row" style="justify-content:center;margin-top:10px;"><button id="ttsSpeak">🔊 Speak</button><button id="ttsPause" class="outline-btn">⏸ Pause</button><button id="ttsStop" class="outline-btn">⏹ Stop</button><button id="ttsDownloadText" class="outline-btn">📥 Download Text</button></div>
                <div class="tts-note">⚠️ <strong>Audio download is not possible</strong> using the browser's built-in speech synthesis. The Web Speech API does not provide a way to capture the audio stream. You can download the spoken text as a .txt file, or use a screen recorder to capture the audio.</div>`;
            const synth = window.speechSynthesis;
            const voiceSelect = document.getElementById('ttsVoice');

            function populateVoices() {
                const voices = synth.getVoices();
                voiceSelect.innerHTML = voices.map(v =>
                    `<option value="${v.name}">${v.name} (${v.lang})</option>`).join('');
                if (voices.length && !voiceSelect.value) {
                    const en = voices.find(v => v.lang.startsWith('en'));
                    if (en) voiceSelect.value = en.name;
                }
            }
            populateVoices();
            synth.onvoiceschanged = populateVoices;
            document.getElementById('ttsRate').addEventListener('input', e => document.getElementById('ttsRateVal')
                .textContent = parseFloat(e.target.value).toFixed(1));
            document.getElementById('ttsPitch').addEventListener('input', e => document.getElementById('ttsPitchVal')
                .textContent = parseFloat(e.target.value).toFixed(1));
            document.getElementById('ttsSpeak').addEventListener('click', () => {
                const text = document.getElementById('ttsText').value.trim();
                if (!text) return showToast('⚠️ Enter text');
                synth.cancel();
                const u = new SpeechSynthesisUtterance(text);
                const voice = synth.getVoices().find(v => v.name === voiceSelect.value);
                if (voice) u.voice = voice;
                u.rate = parseFloat(document.getElementById('ttsRate').value);
                u.pitch = parseFloat(document.getElementById('ttsPitch').value);
                synth.speak(u);
                showToast('🔊 Speaking...');
            });
            document.getElementById('ttsPause').addEventListener('click', () => {
                if (synth.speaking && !synth.paused) { synth.pause();
                    showToast('⏸ Paused'); } else if (synth.paused) { synth.resume();
                    showToast('▶ Resumed'); }
            });
            document.getElementById('ttsStop').addEventListener('click', () => { synth.cancel();
                showToast('⏹ Stopped'); });
            document.getElementById('ttsDownloadText').addEventListener('click', () => {
                const text = document.getElementById('ttsText').value;
                const blob = new Blob([text], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'speech.txt';
                a.click();
                showToast('📥 Text downloaded');
            });
        }

        // ---------- UNIT CONVERTER ----------
        function unitConverterTool(c) {
            const categories = {
                length: {
                    name: '📏 Length',
                    units: [
                        { id: 'meter', name: 'Meter (m)', factor: 1 }, { id: 'kilometer',
                            name: 'Kilometer (km)', factor: 1000 }, { id: 'centimeter',
                            name: 'Centimeter (cm)', factor: 0.01 }, { id: 'millimeter',
                            name: 'Millimeter (mm)', factor: 0.001 }, { id: 'mile',
                            name: 'Mile (mi)', factor: 1609.344 }, { id: 'yard',
                            name: 'Yard (yd)', factor: 0.9144 }, { id: 'foot', name: 'Foot (ft)',
                            factor: 0.3048 }, { id: 'inch', name: 'Inch (in)', factor: 0.0254 }
                    ]
                },
                weight: {
                    name: '⚖️ Weight',
                    units: [
                        { id: 'kilogram', name: 'Kilogram (kg)', factor: 1 }, { id: 'gram',
                            name: 'Gram (g)', factor: 0.001 }, { id: 'milligram',
                            name: 'Milligram (mg)', factor: 0.000001 }, { id: 'pound',
                            name: 'Pound (lb)', factor: 0.453592 }, { id: 'ounce',
                            name: 'Ounce (oz)', factor: 0.0283495 }, { id: 'ton', name: 'Ton (t)',
                            factor: 1000 }
                    ]
                },
                temperature: {
                    name: '🌡️ Temperature',
                    units: [
                        { id: 'celsius', name: 'Celsius (°C)', factor: null }, { id: 'fahrenheit',
                            name: 'Fahrenheit (°F)', factor: null }, { id: 'kelvin',
                            name: 'Kelvin (K)', factor: null }
                    ]
                },
                volume: {
                    name: '🧪 Volume',
                    units: [
                        { id: 'liter', name: 'Liter (L)', factor: 1 }, { id: 'milliliter',
                            name: 'Milliliter (mL)', factor: 0.001 }, { id: 'gallon',
                            name: 'Gallon (gal)', factor: 3.78541 }, { id: 'quart',
                            name: 'Quart (qt)', factor: 0.946353 }, { id: 'pint',
                            name: 'Pint (pt)', factor: 0.473176 }, { id: 'cup', name: 'Cup',
                            factor: 0.236588 }
                    ]
                },
                area: {
                    name: '📐 Area',
                    units: [
                        { id: 'sqmeter', name: 'Square Meter (m²)', factor: 1 },
                        { id: 'sqkilometer', name: 'Square Kilometer (km²)', factor: 1000000 },
                        { id: 'sqmile', name: 'Square Mile (mi²)', factor: 2589988 },
                        { id: 'sqfoot', name: 'Square Foot (ft²)', factor: 0.092903 },
                        { id: 'acre', name: 'Acre', factor: 4046.86 }, { id: 'hectare',
                            name: 'Hectare (ha)', factor: 10000 }
                    ]
                },
                speed: {
                    name: '💨 Speed',
                    units: [
                        { id: 'mps', name: 'Meter/sec (m/s)', factor: 1 }, { id: 'kph',
                            name: 'Kilometer/hour (km/h)', factor: 0.277778 }, { id: 'mph',
                            name: 'Mile/hour (mph)', factor: 0.44704 }, { id: 'knot',
                            name: 'Knot (kn)', factor: 0.514444 }
                    ]
                }
            };

            function convertTemperature(value, from, to) {
                let c = value;
                if (from === 'fahrenheit') c = (value - 32) * 5 / 9;
                if (from === 'kelvin') c = value - 273.15;
                if (to === 'fahrenheit') return c * 9 / 5 + 32;
                if (to === 'kelvin') return c + 273.15;
                return c;
            }

            function convert(value, fromUnit, toUnit, catKey) {
                if (catKey === 'temperature') return convertTemperature(value, fromUnit, toUnit);
                const cat = categories[catKey],
                    from = cat.units.find(u => u.id === fromUnit),
                    to = cat.units.find(u => u.id === toUnit);
                return (from && to) ? (value * from.factor) / to.factor : value;
            }
            c.innerHTML =
                `<div class="row"><div><label>Category</label><select id="ucCategory"></select></div></div><div class="converter-row"><div><label>Value</label><input type="number" id="ucInput" value="1" step="any"></div><div><label>From</label><select id="ucFrom"></select></div><div class="swap-icon" id="ucSwap">🔄</div><div><label>To</label><select id="ucTo"></select></div></div><div class="result-badge" id="ucResult">--</div><button class="outline-btn" id="ucCopy" style="display:block;margin:0 auto;">📋 Copy Result</button>`;
            const catSel = document.getElementById('ucCategory'),
                fromSel = document.getElementById('ucFrom'),
                toSel = document.getElementById('ucTo');
            const inputEl = document.getElementById('ucInput'),
                resultEl = document.getElementById('ucResult');

            function populateCat() {
                catSel.innerHTML = Object.entries(categories).map(([k, v]) =>
                    `<option value="${k}">${v.name}</option>`).join('');
                populateUnits();
            }

            function populateUnits() {
                const cat = categories[catSel.value],
                    opts = cat.units.map(u => `<option value="${u.id}">${u.name}</option>`).join('');
                fromSel.innerHTML = opts;
                toSel.innerHTML = opts;
                if (cat.units.length >= 2) { fromSel.value = cat.units[0].id;
                    toSel.value = cat.units[cat.units.length - 1].id; }
                updateResult();
            }

            function updateResult() {
                const val = parseFloat(inputEl.value);
                if (isNaN(val)) { resultEl.textContent = '--'; return; }
                const res = convert(val, fromSel.value, toSel.value, catSel.value);
                resultEl.textContent = (res === null || isNaN(res)) ? '--' : parseFloat(res.toPrecision(12)) +
                    ' ' + (categories[catSel.value].units.find(u => u.id === toSel.value)?.name.split(' ')[0] ||
                        '');
            }
            catSel.addEventListener('change', populateUnits);
            fromSel.addEventListener('change', updateResult);
            toSel.addEventListener('change', updateResult);
            inputEl.addEventListener('input', updateResult);
            document.getElementById('ucSwap').addEventListener('click', () => {
                const t = fromSel.value;
                fromSel.value = toSel.value;
                toSel.value = t;
                updateResult();
            });
            document.getElementById('ucCopy').addEventListener('click', () => copyText(resultEl.textContent));
            populateCat();
        }

        // Wrap render functions to update floating timer
        const _renderCategory = renderCategory;
        renderCategory = function(catId) { _renderCategory(catId);
            updateFloatingTimer(); };
        const _renderHome = renderHome;
        renderHome = function() { _renderHome();
            updateFloatingTimer(); };
        const _renderTool = renderTool;
        renderTool = function(catId, toolId) { _renderTool(catId, toolId);
            updateFloatingTimer(); };

        renderHome();
    </script>
