<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevToolKit Pro · Neon Developer Tools</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.7.6/dist/quagga.min.js">
    </script>
    <style>
        :root {
            --bg: #050510;
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-lime: #39ff14;
            --neon-yellow: #ffff00;
            --neon-orange: #ff6600;
            --card-bg: rgba(10, 10, 30, 0.8);
            --border: rgba(255, 255, 255, 0.15);
            --text: #e0e0ff;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at 50% 50%, #0a0a2e, #020210);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }
        #app {
            width: 100%;
            max-width: 960px;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            width: 100%;
            margin-top: 30px;
        }
        .cat-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
        }
        .cat-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px var(--neon-cyan), 0 0 60px rgba(255, 0, 255, 0.4);
        }
        .cat-card .icon {
            font-size: 3.5rem;
            filter: drop-shadow(0 0 10px var(--neon-cyan));
        }
        .cat-card h2 {
            margin: 10px 0 5px;
            font-size: 1.5rem;
            text-shadow: 0 0 8px var(--neon-cyan);
        }
        .cat-card p {
            font-size: 0.9rem;
            color: #aaa;
        }
        .back-btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            transition: 0.3s;
            text-shadow: 0 0 5px var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
        }
        .back-btn:hover {
            background: rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 25px var(--neon-cyan);
        }
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
            width: 100%;
        }
        .tool-item {
            background: rgba(20, 20, 40, 0.7);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .tool-item:hover {
            border-color: var(--neon-magenta);
            box-shadow: 0 0 20px var(--neon-magenta);
            transform: translateY(-3px);
        }
        .tool-item .emoji {
            font-size: 2rem;
            filter: drop-shadow(0 0 6px var(--neon-magenta));
        }
        .tool-item h3 {
            margin: 8px 0 4px;
            font-size: 1rem;
        }
        .detail-card {
            background: rgba(15, 15, 35, 0.8);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.2);
        }
        textarea,
        input,
        select {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-family: monospace;
            margin: 8px 0;
            outline: none;
            transition: 0.2s;
        }
        textarea:focus,
        input:focus,
        select:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        label {
            display: block;
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
            border: none;
            color: black;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            text-transform: uppercase;
        }
        button:hover {
            filter: brightness(1.2);
            transform: scale(1.03);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: none;
            transform: none;
        }
        .outline-btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: none;
            text-shadow: 0 0 5px var(--neon-cyan);
        }
        .danger-btn {
            background: transparent;
            border: 1px solid #ff073a;
            color: #ff073a;
            box-shadow: none;
            text-shadow: 0 0 5px #ff073a;
        }
        .output-box {
            background: black;
            border: 1px solid var(--neon-magenta);
            border-radius: 10px;
            padding: 16px;
            font-family: monospace;
            min-height: 80px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #ddd;
            margin: 10px 0;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
        }
        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .row>* {
            flex: 1;
            min-width: 80px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-magenta));
            color: black;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            z-index: 999;
            box-shadow: 0 0 20px var(--neon-cyan);
            animation: fadeOut 2.5s forwards;
        }
        @keyframes fadeOut {
            0% {
                opacity: 1;
            }
            70% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }
        .tab-bar {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: none;
            color: #aaa;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            border-radius: 0;
            box-shadow: none;
            text-transform: none;
            margin: 0;
            font-size: 0.85rem;
        }
        .tab-btn.active {
            background: rgba(0, 255, 255, 0.2);
            color: var(--neon-cyan);
            text-shadow: 0 0 8px var(--neon-cyan);
        }
        .speed-gauge {
            text-align: center;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 30px var(--neon-lime);
            color: var(--neon-lime);
            margin: 10px 0;
            min-height: 60px;
        }
        .speed-metric {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            min-width: 100px;
        }
        .speed-metric .val {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--neon-cyan);
        }
        .speed-metric .lbl {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .meter-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto;
        }
        .meter-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 12;
        }
        .meter-fill {
            fill: none;
            stroke: var(--neon-lime);
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s;
        }
        .meter-center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--neon-lime);
            text-shadow: 0 0 10px var(--neon-lime);
        }
        .time-display {
            font-size: 3.5rem;
            font-weight: 900;
            font-family: 'Courier New', monospace;
            text-align: center;
            letter-spacing: 4px;
            text-shadow: 0 0 25px var(--neon-lime);
            color: var(--neon-lime);
            margin: 10px 0;
            user-select: none;
        }
        .time-display.paused {
            text-shadow: 0 0 15px var(--neon-yellow);
            color: var(--neon-yellow);
        }
        .lap-list {
            max-height: 180px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .lap-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-family: monospace;
            font-size: 0.9rem;
        }
        .notes-list {
            max-height: 350px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .note-card {
            background: rgba(20, 20, 45, 0.7);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            margin: 8px 0;
            cursor: pointer;
            transition: 0.3s;
        }
        .note-card:hover {
            border-color: var(--neon-lime);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }
        .note-card.selected {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        .note-card h4 {
            margin: 0 0 4px;
            color: #fff;
            font-size: 1rem;
        }
        .note-card .note-date {
            font-size: 0.7rem;
            color: #666;
        }
        .note-card .note-preview {
            font-size: 0.8rem;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .converter-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .converter-row>div {
            flex: 1;
            min-width: 120px;
        }
        .swap-icon {
            cursor: pointer;
            font-size: 1.5rem;
            padding: 0 8px;
            transition: 0.3s;
            user-select: none;
            align-self: center;
        }
        .swap-icon:hover {
            transform: scale(1.3);
            filter: drop-shadow(0 0 8px var(--neon-cyan));
        }
        .result-badge {
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid var(--neon-cyan);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            margin: 10px 0;
            word-break: break-all;
        }
        #floatingTimer {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 30, 0.9);
            border: 1px solid var(--neon-cyan);
            border-radius: 12px;
            padding: 12px 18px;
            z-index: 1000;
            cursor: pointer;
            display: none;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            font-family: monospace;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--neon-lime);
            text-shadow: 0 0 10px var(--neon-lime);
            transition: transform 0.2s;
        }
        #floatingTimer:hover {
            transform: scale(1.05);
        }
        #floatingTimer.expired {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% {
                border-color: #ff073a;
                box-shadow: 0 0 20px #ff073a;
            }
            50% {
                border-color: var(--neon-yellow);
                box-shadow: 0 0 30px var(--neon-yellow);
            }
            100% {
                border-color: #ff073a;
                box-shadow: 0 0 20px #ff073a;
            }
        }
        .tts-note {
            font-size: 0.7rem;
            color: #ffaa00;
            background: rgba(255, 170, 0, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            border: 1px solid rgba(255, 170, 0, 0.3);
        }
        .color-swatch {
            display: inline-block;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 2px solid #fff;
            cursor: pointer;
            transition: 0.2s;
            vertical-align: middle;
        }
        .color-swatch:hover {
            transform: scale(1.2);
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        .flex-demo {
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed var(--border);
            border-radius: 12px;
            min-height: 180px;
            display: flex;
            gap: 8px;
            padding: 12px;
            transition: all 0.3s;
            flex-wrap: wrap;
        }
        .flex-demo .flex-child {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
            border-radius: 8px;
            padding: 16px;
            font-weight: bold;
            color: #000;
            text-align: center;
            min-width: 50px;
            transition: all 0.3s;
        }
        .gradient-preview {
            width: 100%;
            height: 120px;
            border-radius: 16px;
            border: 2px solid var(--border);
            margin: 10px 0;
            transition: background 0.3s;
        }
        .shadow-preview {
            width: 150px;
            height: 150px;
            background: #fff;
            border-radius: 16px;
            margin: 20px auto;
            transition: box-shadow 0.3s;
        }
        .contrast-result {
            padding: 16px;
            border-radius: 12px;
            font-weight: bold;
            text-align: center;
            font-size: 1.1rem;
        }
        .contrast-pass {
            background: rgba(57, 255, 20, 0.2);
            color: var(--neon-lime);
            border: 1px solid var(--neon-lime);
        }
        .contrast-fail {
            background: rgba(255, 7, 58, 0.2);
            color: #ff073a;
            border: 1px solid #ff073a;
        }
        .diff-added {
            background: rgba(57, 255, 20, 0.2);
            color: var(--neon-lime);
        }
        .diff-removed {
            background: rgba(255, 7, 58, 0.2);
            color: #ff073a;
        }
        .diff-line {
            font-family: monospace;
            padding: 2px 8px;
            white-space: pre-wrap;
            font-size: 0.85rem;
        }
        canvas {
            max-width: 100%;
            border-radius: 12px;
        }
        @media (max-width:600px) {
            .time-display {
                font-size: 2.2rem;
                letter-spacing: 2px;
            }
            .speed-gauge {
                font-size: 2rem;
            }
            .category-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .cat-card {
                padding: 18px;
            }
            .cat-card .icon {
                font-size: 2.5rem;
            }
            .shadow-preview {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="floatingTimer" title="Click to return to timer">⏱ 00:00:00</div>
    <div id="toastContainer"></div>

    <script>
        const app = document.getElementById('app');
        const floatingTimerEl = document.getElementById('floatingTimer');
        let audioCtx = null;

        function getAudioContext() {
            if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }

        function playBeep() {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch (e) {}
        }
        const globalTimer = {
            running: false,
            remaining: 0,
            total: 0,
            interval: null,
            beepInterval: null,
            expired: false,
            startTime: 0,
            pausedRemaining: 0
        };

        function stopBeeping() {
            if (globalTimer.beepInterval) { clearInterval(globalTimer.beepInterval);
                globalTimer.beepInterval = null; }
        }

        function startBeeping() {
            stopBeeping();
            playBeep();
            globalTimer.beepInterval = setInterval(playBeep, 1000);
        }

        function updateGlobalTimerDisplay() {
            if (!globalTimer.running) return;
            const now = performance.now();
            const newRemaining = globalTimer.pausedRemaining - (now - globalTimer.startTime);
            if (newRemaining <= 0) {
                globalTimer.remaining = 0;
                globalTimer.running = false;
                globalTimer.expired = true;
                clearInterval(globalTimer.interval);
                globalTimer.interval = null;
                startBeeping();
                updateFloatingTimer();
                if (document.getElementById('tmDisplay')) {
                    document.getElementById('tmDisplay').textContent = '00:00:00';
                    document.getElementById('tmStart').textContent = '▶ Start';
                    document.getElementById('tmPause').disabled = true;
                }
                return;
            }
            globalTimer.remaining = newRemaining;
            if (floatingTimerEl.style.display !== 'none') {
                floatingTimerEl.textContent = '⏱ ' + formatTimeMS(newRemaining);
                floatingTimerEl.classList.remove('expired');
            }
            if (document.getElementById('tmDisplay')) {
                document.getElementById('tmDisplay').textContent = formatTimeMS(newRemaining);
            }
        }

        function startGlobalTimer(durationMs) {
            stopGlobalTimer(false);
            globalTimer.total = durationMs;
            globalTimer.remaining = durationMs;
            globalTimer.pausedRemaining = durationMs;
            globalTimer.running = true;
            globalTimer.expired = false;
            globalTimer.startTime = performance.now();
            stopBeeping();
            globalTimer.interval = setInterval(updateGlobalTimerDisplay, 200);
            updateFloatingTimer();
        }

        function pauseGlobalTimer() {
            if (!globalTimer.running) return;
            const now = performance.now();
            globalTimer.pausedRemaining = globalTimer.remaining - (now - globalTimer.startTime);
            if (globalTimer.pausedRemaining < 0) globalTimer.pausedRemaining = 0;
            globalTimer.running = false;
            globalTimer.remaining = globalTimer.pausedRemaining;
            clearInterval(globalTimer.interval);
            globalTimer.interval = null;
            stopBeeping();
            updateFloatingTimer();
        }

        function resumeGlobalTimer() {
            if (globalTimer.running || globalTimer.expired || globalTimer.remaining <= 0) return;
            globalTimer.running = true;
            globalTimer.startTime = performance.now();
            globalTimer.pausedRemaining = globalTimer.remaining;
            stopBeeping();
            globalTimer.interval = setInterval(updateGlobalTimerDisplay, 200);
            updateFloatingTimer();
        }

        function stopGlobalTimer(reset = true) {
            globalTimer.running = false;
            clearInterval(globalTimer.interval);
            globalTimer.interval = null;
            stopBeeping();
            if (reset) {
                globalTimer.remaining = 0;
                globalTimer.total = 0;
                globalTimer.expired = false;
                globalTimer.pausedRemaining = 0;
            }
            updateFloatingTimer();
        }

        function formatTimeMS(ms) {
            if (ms < 0) ms = 0;
            const totalSec = Math.ceil(ms / 1000);
            const hrs = Math.floor(totalSec / 3600),
                mins = Math.floor((totalSec % 3600) / 60),
                secs = totalSec % 60;
            return `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
        }

        function updateFloatingTimer() {
            const currentViewIsTimer = document.getElementById('tmDisplay') !== null;
            if (globalTimer.running || globalTimer.expired) {
                if (!currentViewIsTimer) {
                    floatingTimerEl.style.display = 'block';
                    const timeStr = globalTimer.expired ? '00:00:00' : formatTimeMS(globalTimer.remaining);
                    floatingTimerEl.textContent = (globalTimer.expired ? '⚠️ ' : '⏱ ') + timeStr;
                    floatingTimerEl.classList.toggle('expired', globalTimer.expired);
                } else {
                    floatingTimerEl.style.display = 'none';
                }
            } else {
                floatingTimerEl.style.display = 'none';
            }
        }
        floatingTimerEl.addEventListener('click', () => {
            renderTool('utilities', 'stopwatch');
            updateFloatingTimer();
        });

        const categories = [
            { id: 'text', icon: '📝', name: 'Text & Encode', desc: 'Encode, decode, generate text' },
            { id: 'design', icon: '🎨', name: 'CSS & Design',
            desc: 'Gradients, shadows, colors, flexbox' },
            { id: 'code', icon: '💻', name: 'Code Tools', desc: 'JSON, minifiers, regex, diff' },
            { id: 'security', icon: '🔐', name: 'Security', desc: 'Passwords, hashing' },
            { id: 'qrbarcode', icon: '📱', name: 'QR & Barcode',
                desc: 'Generate and read QR codes & barcodes' },
            { id: 'utilities', icon: '🛠️', name: 'Utilities',
                desc: 'Speed test, stopwatch, notes, TTS, converter' }
        ];
        const tools = {
            text: [
                { id: 'base64', emoji: '🔤', title: 'Base64 Encoder/Decoder' },
                { id: 'urlencode', emoji: '🔗', title: 'URL Encoder/Decoder' },
                { id: 'wordcounter', emoji: '📊', title: 'Word & Character Counter' },
                { id: 'lorem', emoji: '📜', title: 'Lorem Ipsum Generator' },
                { id: 'uuid', emoji: '🆔', title: 'UUID Generator' }

        function rgbToHsl(r, g, b) {
            r /= 255;
            g /= 255;
            b /= 255;
            const max = Math.max(r, g, b),
                min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) { h = s = 0; } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r:
                        h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
                        break;
                    case g:
                        h = ((b - r) / d + 2) / 6;
                        break;
                    case b:
                        h = ((r - g) / d + 4) / 6;
                        break;
                }
            }
            return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
        }

                        '✅ AA Pass (normal text)';
                    res.className = 'contrast-result contrast-pass'; } else if (ratio >= 3) { res.textContent =
                        '⚠️ AA Large Text Only';

                        '❌ Fail – insufficient contrast';

        function getLuminance(hex) {
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            const toLin = (c) => c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
            return 0.2126 * toLin(r) + 0.7152 * toLin(g) + 0.0722 * toLin(b);
        }

        function getContrastRatio(c1, c2) {
            const l1 = getLuminance(c1),
                l2 = getLuminance(c2);
            const lighter = Math.max(l1, l2),
                darker = Math.min(l1, l2);
            return (lighter + 0.05) / (darker + 0.05);
        }

        function generateHarmonies(baseHex) {
            const r = parseInt(baseHex.slice(1, 3), 16);
            const g = parseInt(baseHex.slice(3, 5), 16);
            const b = parseInt(baseHex.slice(5, 7), 16);
            const hsl = rgbToHsl(r, g, b);
            const results = [baseHex];
            // Complementary
            results.push(hslToHex((hsl[0] + 180) % 360, hsl[1], hsl[2]));
            // Analogous
            results.push(hslToHex((hsl[0] + 30) % 360, hsl[1], hsl[2]));
            results.push(hslToHex((hsl[0] + 330) % 360, hsl[1], hsl[2]));
            // Triadic
            results.push(hslToHex((hsl[0] + 120) % 360, hsl[1], hsl[2]));
            results.push(hslToHex((hsl[0] + 240) % 360, hsl[1], hsl[2]));
            // Lighter & darker
            results.push(hslToHex(hsl[0], hsl[1], Math.min(100, hsl[2] + 25)));
            results.push(hslToHex(hsl[0], hsl[1], Math.max(0, hsl[2] - 25)));
            return [...new Set(results)];
        }

        function hslToHex(h, s, l) {
            s /= 100;
            l /= 100;
            const a = s * Math.min(l, 1 - l);
            const f = n => { const k = (n + h / 30) % 12; return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1); };
            const toHex = x => Math.round(x * 255).toString(16).padStart(2, '0');
            return '#' + toHex(f(0)) + toHex(f(8)) + toHex(f(4));
        }

        function speedTestTool(c) {
            c.innerHTML = `

                <div id="speedError" style="color:#ff073a;text-align:center;margin-top:8px;display:none;"></div>
                <p style="color:#555;font-size:0.65rem;text-align:center;margin-top:8px;">Uses Cloudflare & multiple fallback CDNs.</p>`;
            const gauge = document.getElementById('speedGauge');
            const status = document.getElementById('speedStatus');
            const pingEl = document.getElementById('pingVal');
            const dlEl = document.getElementById('dlVal');
            const ulEl = document.getElementById('ulVal');
            const meterFill = document.getElementById('meterFill');
            const meterCenter = document.getElementById('meterCenter');
            const btn = document.getElementById('startSpeedTest');
            const errorDiv = document.getElementById('speedError');
            const MAX_SPEED = 150;
            const circumference = 2 * Math.PI * 68;

            function setMeter(speedMbps) {
                const percent = Math.min(Math.max(speedMbps / MAX_SPEED, 0), 1);
                meterFill.style.strokeDashoffset = circumference * (1 - percent);
                meterCenter.textContent = speedMbps ? speedMbps.toFixed(1) : '--';
            }

            function fetchWithTimeout(url, options = {}, timeoutMs = 15000) {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), timeoutMs);
                return fetch(url, { ...options, signal: controller.signal }).then(resp => { clearTimeout(id);
                    return resp; }).catch(err => { clearTimeout(id); throw err; });
            }
            const DOWNLOAD_URLS = [
                { url: 'https://speed.cloudflare.com/__down?bytes=500000', size: 500000, name: 'Cloudflare' },
                { url: 'https://httpbin.org/bytes/524288', size: 524288, name: 'httpbin' },
                { url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/JPEG_example_flower_500px.jpg/500px-JPEG_example_flower_500px.jpg',
                    size: null, name: 'Wikimedia' },
            ];
            const PING_URLS = ['https://speed.cloudflare.com/__down?bytes=0', 'https://httpbin.org/delay/0',
                'https://www.google.com/favicon.ico'
            ];
            const UPLOAD_URLS = [{ url: 'https://speed.cloudflare.com/__up', name: 'Cloudflare' }, { url: 'https://httpbin.org/post',
                name: 'httpbin' }];
            btn.addEventListener('click', async () => {
                btn.disabled = true;
                btn.textContent = '⏳ Testing...';
                gauge.textContent = '...';
                gauge.style.color = 'var(--neon-yellow)';
                status.textContent = 'Checking connectivity...';
                pingEl.textContent = '...';
                dlEl.textContent = '...';
                ulEl.textContent = '...';
                setMeter(0);
                errorDiv.style.display = 'none';
                let online = false;
                for (const pingUrl of PING_URLS) {
                    try { await fetchWithTimeout(pingUrl, { method: 'HEAD', cache: 'no-store' }, 5000);
                        online = true; break; } catch (e) { continue; }
                }
                if (!online) { errorDiv.textContent =
                        '❌ No internet connection detected.';
                    errorDiv.style.display = 'block';
                    status.textContent = 'Failed';
                    gauge.textContent = 'ERR';
                    gauge.style.color = '#ff073a';
                    btn.disabled = false;
                    btn.textContent = '🔄 Retry'; return; }
                status.textContent = 'Measuring ping...';
                let totalPing = 0,
                    pingCount = 0;
                for (const pingUrl of PING_URLS) {
                    for (let a = 0; a < 2; a++) {
                        try {
                            const start = performance.now();
                            await fetchWithTimeout(pingUrl, { method: 'HEAD', cache: 'no-store' }, 5000);
                            totalPing += performance.now() - start;
                            pingCount++; if (pingCount >= 4) break;
                        } catch (e) { continue; }
                    }
                    if (pingCount >= 4) break;
                }
                if (pingCount > 0) pingEl.textContent = Math.round(totalPing / pingCount);
                else pingEl.textContent = 'N/A';
                status.textContent = 'Testing download...';
                let dlMbps = null,
                    dlSourceUsed = '';
                for (const dlSource of DOWNLOAD_URLS) {
                    try {
                        status.textContent = `Download test (${dlSource.name})...`;
                        const dlStart = performance.now();
                        const response = await fetchWithTimeout(dlSource.url, { cache: 'no-store' }, 20000);
                        const data = await response.arrayBuffer();
                        const dlEnd = performance.now();
                        const actualSize = data.byteLength;
                        if (actualSize < 1000) throw new Error('Too small');
                        dlMbps = (actualSize * 8) / ((dlEnd - dlStart) / 1000) / 1000000;
                        dlSourceUsed = dlSource.name;
                        break;
                    } catch (e) { continue; }
                }
                if (dlMbps !== null) { dlEl.textContent = dlMbps.toFixed(2);
                    gauge.textContent = dlMbps.toFixed(1);
                    gauge.style.color = 'var(--neon-lime)';
                    setMeter(dlMbps);
                    status.textContent = `📥 Download: ${dlSourceUsed}`; } else { dlEl.textContent = 'N/A';
                    gauge.textContent = 'ERR';
                    gauge.style.color = '#ff073a';
                    setMeter(0);
                    status.textContent = 'Download failed';
                    errorDiv.textContent = '⚠️ Download test failed on all servers.';
                    errorDiv.style.display = 'block'; }
                status.textContent = 'Testing upload...';
                let ulMbps = null,
                    ulSourceUsed = '';
                const payloadSize = 50 * 1024;
                const payload = new Uint8Array(payloadSize);
                crypto.getRandomValues(payload);
                const blob = new Blob([payload]);
                for (const ulSource of UPLOAD_URLS) {
                    try {
                        status.textContent = `Upload test (${ulSource.name})...`;
                        const ulStart = performance.now();
                        await fetchWithTimeout(ulSource.url, { method: 'POST', body: blob,
                            cache: 'no-store' }, 20000);
                        const ulEnd = performance.now();
                        ulMbps = (payloadSize * 8) / ((ulEnd - ulStart) / 1000) / 1000000;
                        ulSourceUsed = ulSource.name;
                        break;
                    } catch (e) { continue; }
                }
                if (ulMbps !== null) { ulEl.textContent = ulMbps.toFixed(2);
                    status.textContent = `✅ Complete (DL:${dlSourceUsed||'N/A'} UL:${ulSourceUsed})`; } else { ulEl
                        .textContent = 'N/A'; }
                if (dlMbps === null && ulMbps === null) { errorDiv.textContent =
                        '❌ All speed tests failed.';
                    errorDiv.style.display = 'block';
                    gauge.textContent = 'ERR';
                    gauge.style.color = '#ff073a'; }
                btn.disabled = false;
                btn.textContent = '🚀 Start Speed Test';
            });
        }

        function stopwatchTimerTool(c) {

            let swInterval = null,

            const swStartBtn = document.getElementById('swStart'),

            function formatSW(ms) {
                const cs = Math.floor(ms / 10) % 100,
                    s = Math.floor(ms / 1000) % 60,
                    m = Math.floor(ms / 60000) % 60,
                    h = Math.floor(ms / 3600000);
                return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
            }

            function updateSW() {

            swStartBtn.addEventListener('click', () => {

                    swStartBtn.textContent = '⏹ Stop';

                    swLapBtn.disabled = false;
                    swInterval = setInterval(updateSW, 16); } else { swRunning = false;
                    swElapsed += performance.now() - swStartTime;
                    swStartBtn.textContent = '▶ Start';
                    swStartBtn.style.background =
                        'linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta))';
                    swLapBtn.disabled = true;

            swLapBtn.addEventListener('click', () => { lapCount++; const total = swElapsed + (swRunning ? performance

            const tmHr = document.getElementById('tmHr'),
                tmMin = document.getElementById('tmMin'),

            function getTimerInputMs() { return ((parseInt(tmHr.value) || 0) * 3600 + (parseInt(tmMin.value) || 0) * 60 + (
                    parseInt(tmSec.value) || 0)) * 1000; }

            function updateTimerUI() {
                const rem = globalTimer.remaining;
                tmDisplay.textContent = formatTimeMS(rem);
                if (globalTimer.expired) { tmDisplay.style.color = '#ff073a';
                    tmStartBtn.textContent = '▶ Start';
                    tmPauseBtn.disabled = true; } else if (globalTimer.running) { tmDisplay.style.color = rem < 10000 ?
                        '#ff6600' : 'var(--neon-lime)';
                    tmStartBtn.textContent = '⏹ Stop';
                    tmStartBtn.style.background = 'linear-gradient(135deg, #ff6600, #ff00ff)';
                    tmPauseBtn.disabled = false; } else { tmDisplay.style.color = rem <= 0 ? 'var(--neon-lime)' : (rem <
                        10000 ? '#ff6600' : 'var(--neon-lime)');
                    tmStartBtn.textContent = '▶ Start';
                    tmStartBtn.style.background =
                        'linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta))';
                    tmPauseBtn.disabled = true; }
            }
            if (!globalTimer.running && !globalTimer.expired && globalTimer.remaining <= 0) { const ms = getTimerInputMs();
                globalTimer.remaining = ms;
                globalTimer.total = ms; }
            updateTimerUI();
            tmStartBtn.addEventListener('click', () => { if (globalTimer.running) { pauseGlobalTimer(); } else if (
                    globalTimer.expired) { stopGlobalTimer(true); const ms = getTimerInputMs();

            tmPauseBtn.addEventListener('click', () => { pauseGlobalTimer();

            tmResetBtn.addEventListener('click', () => { stopGlobalTimer(true); const ms = getTimerInputMs();
                globalTimer.remaining = ms;
                globalTimer.total = ms;
                globalTimer.expired = false;
                tmDisplay.textContent = formatTimeMS(ms);
                tmDisplay.style.color = 'var(--neon-lime)';
                tmStartBtn.textContent = '▶ Start';
                tmStartBtn.style.background =
                    'linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta))';
                tmPauseBtn.disabled = true;
                updateFloatingTimer(); });
            ['tmHr', 'tmMin', 'tmSec'].forEach(id => document.getElementById(id).addEventListener('input', () => { if (!
                    globalTimer.running && !globalTimer.expired) { const ms = getTimerInputMs();

        }

                        name: 'Kilometer (km)', factor: 1000 }, { id: 'centimeter', name: 'Centimeter (cm)',
                        factor: 0.01 }, { id: 'millimeter', name: 'Millimeter (mm)', factor: 0.001 },
                    { id: 'mile', name: 'Mile (mi)', factor: 1609.344 }, { id: 'yard', name: 'Yard (yd)',
                        factor: 0.9144 }, { id: 'foot', name: 'Foot (ft)', factor: 0.3048 }, { id: 'inch',
                        name: 'Inch (in)', factor: 0.0254 }
                ] },
                weight: { name: '⚖️ Weight', units: [{ id: 'kilogram', name: 'Kilogram (kg)', factor: 1 }, { id: 'gram',
                        name: 'Gram (g)', factor: 0.001 }, { id: 'milligram', name: 'Milligram (mg)',
                        factor: 0.000001 }, { id: 'pound', name: 'Pound (lb)', factor: 0.453592 }, { id: 'ounce',
                        name: 'Ounce (oz)', factor: 0.0283495 }, { id: 'ton', name: 'Ton (t)', factor: 1000 }
                ] },
                temperature: { name: '🌡️ Temperature', units: [{ id: 'celsius', name: 'Celsius (°C)', factor: null },
                    { id: 'fahrenheit', name: 'Fahrenheit (°F)', factor: null }, { id: 'kelvin',
                        name: 'Kelvin (K)', factor: null }
                ] },
                volume: { name: '🧪 Volume', units: [{ id: 'liter', name: 'Liter (L)', factor: 1 }, { id: 'milliliter',
                        name: 'Milliliter (mL)', factor: 0.001 }, { id: 'gallon', name: 'Gallon (gal)',
                        factor: 3.78541 }, { id: 'quart', name: 'Quart (qt)', factor: 0.946353 }, { id: 'pint',
                        name: 'Pint (pt)', factor: 0.473176 }, { id: 'cup', name: 'Cup', factor: 0.236588 }
                ] },
                area: { name: '📐 Area', units: [{ id: 'sqmeter', name: 'Square Meter (m²)', factor: 1 },
                    { id: 'sqkilometer', name: 'Square Kilometer (km²)', factor: 1000000 }, { id: 'sqmile',
                        name: 'Square Mile (mi²)', factor: 2589988 }, { id: 'sqfoot',
                        name: 'Square Foot (ft²)', factor: 0.092903 }, { id: 'acre', name: 'Acre',
                        factor: 4046.86 }, { id: 'hectare', name: 'Hectare (ha)', factor: 10000 }
                ] },
                speed: { name: '💨 Speed', units: [{ id: 'mps', name: 'Meter/sec (m/s)', factor: 1 }, { id: 'kph',
                        name: 'Kilometer/hour (km/h)', factor: 0.277778 }, { id: 'mph',
                        name: 'Mile/hour (mph)', factor: 0.44704 }, { id: 'knot', name: 'Knot (kn)',
                        factor: 0.514444 }
                ] }
            };

            function convertTemperature(value, from, to) { let c = value; if (from === 'fahrenheit') c = (value - 32) * 5 /
                    9; if (from === 'kelvin') c = value - 273.15; if (to === 'fahrenheit') return c * 9 / 5 + 32; if (
                    to === 'kelvin') return c + 273.15; return c; }

            function convert(value, fromUnit, toUnit, catKey) { if (catKey === 'temperature') return convertTemperature(
                    value, fromUnit, toUnit); const cat = categoriesUC[catKey],
                    from = cat.units.find(u => u.id === fromUnit),
                    to = cat.units.find(u => u.id === toUnit); return (from && to) ? (value * from.factor) / to
                    .factor : value; }
            c.innerHTML =
                `<div class="row"><div><label>Category</label><select id="ucCategory"></select></div></div><div class="converter-row"><div><label>Value</label><input type="number" id="ucInput" value="1" step="any"></div><div><label>From</label><select id="ucFrom"></select></div><div class="swap-icon" id="ucSwap">🔄</div><div><label>To</label><select id="ucTo"></select></div></div><div class="result-badge" id="ucResult">--</div><button class="outline-btn" id="ucCopy" style="display:block;margin:0 auto;">📋 Copy Result</button>`;
            const catSel = document.getElementById('ucCategory'),
                fromSel = document.getElementById('ucFrom'),
                toSel = document.getElementById('ucTo');
            const inputEl = document.getElementById('ucInput'),
                resultEl = document.getElementById('ucResult');

            function populateCat() { catSel.innerHTML = Object.entries(categoriesUC).map(([k, v]) =>
                    `<option value="${k}">${v.name}</option>`).join('');
                populateUnits(); }

            function populateUnits() { const cat = categoriesUC[catSel.value],
                    opts = cat.units.map(u => `<option value="${u.id}">${u.name}</option>`).join('');
                fromSel.innerHTML = opts;
                toSel.innerHTML = opts; if (cat.units.length >= 2) { fromSel.value = cat.units[0].id;
                    toSel.value = cat.units[cat.units.length - 1].id; }
                updateResult(); }

            function updateResult() { const val = parseFloat(inputEl.value); if (isNaN(val)) { resultEl.textContent =
                    '--'; return; } const res = convert(val, fromSel.value, toSel.value, catSel.value);
                resultEl.textContent = (res === null || isNaN(res)) ? '--' : parseFloat(res.toPrecision(12)) + ' ' + (
                    categoriesUC[catSel.value].units.find(u => u.id === toSel.value)?.name.split(' ')[0] || ''); }
            catSel.addEventListener('change', populateUnits);
            fromSel.addEventListener('change', updateResult);
            toSel.addEventListener('change', updateResult);
            inputEl.addEventListener('input', updateResult);
            document.getElementById('ucSwap').addEventListener('click', () => { const t = fromSel.value;
                fromSel.value = toSel.value;
                toSel.value = t;
                updateResult(); });
            document.getElementById('ucCopy').addEventListener('click', () => copyText(resultEl.textContent));
            populateCat();
        }

        // Wrap render functions for floating timer
        const _renderCategory = renderCategory;
        renderCategory = function(catId) { _renderCategory(catId);
            updateFloatingTimer(); };
        const _renderHome = renderHome;
        renderHome = function() { _renderHome();
            updateFloatingTimer(); };
        const _renderTool = renderTool;
        renderTool = function(catId, toolId) { _renderTool(catId, toolId);
            updateFloatingTimer(); };

        renderHome();
    </script>
</body>
</html>
