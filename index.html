<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevToolKit Pro · Neon Developer Tools</title>
    <!-- QR / Barcode libraries -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.7.6/dist/quagga.min.js">
    </script>
    <style>
        :root {
            --bg: #050510;
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-lime: #39ff14;
            --neon-yellow: #ffff00;
            --neon-orange: #ff6600;
            --card-bg: rgba(10, 10, 30, 0.8);
            --border: rgba(255, 255, 255, 0.15);
            --text: #e0e0ff;
            --shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at 50% 50%, #0a0a2e, #020210);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }
        #app {
            width: 100%;
            max-width: 960px;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            width: 100%;
            margin-top: 30px;
        }
        .cat-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
        }
        .cat-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px var(--neon-cyan), 0 0 60px rgba(255, 0, 255, 0.4);
        }
        .cat-card .icon {
            font-size: 3.5rem;
            filter: drop-shadow(0 0 10px var(--neon-cyan));
        }
        .cat-card h2 {
            margin: 10px 0 5px;
            font-size: 1.5rem;
            text-shadow: 0 0 8px var(--neon-cyan);
        }
        .cat-card p {
            font-size: 0.9rem;
            color: #aaa;
        }
        .back-btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            transition: 0.3s;
            text-shadow: 0 0 5px var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
        }
        .back-btn:hover {
            background: rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 25px var(--neon-cyan);
        }
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
            width: 100%;
        }
        .tool-item {
            background: rgba(20, 20, 40, 0.7);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .tool-item:hover {
            border-color: var(--neon-magenta);
            box-shadow: 0 0 20px var(--neon-magenta);
            transform: translateY(-3px);
        }
        .tool-item .emoji {
            font-size: 2rem;
            filter: drop-shadow(0 0 6px var(--neon-magenta));
        }
        .tool-item h3 {
            margin: 8px 0 4px;
            font-size: 1rem;
        }
        .detail-card {
            background: rgba(15, 15, 35, 0.8);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.2);
        }
        textarea,
        input,
        select {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-family: monospace;
            margin: 8px 0;
            outline: none;
            transition: 0.2s;
        }
        textarea:focus,
        input:focus,
        select:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        label {
            display: block;
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
            border: none;
            color: black;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            text-transform: uppercase;
        }
        button:hover {
            filter: brightness(1.2);
            transform: scale(1.03);
        }
        .outline-btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: none;
            text-shadow: 0 0 5px var(--neon-cyan);
        }
        .output-box {
            background: black;
            border: 1px solid var(--neon-magenta);
            border-radius: 10px;
            padding: 16px;
            font-family: monospace;
            min-height: 80px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #ddd;
            margin: 10px 0;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
        }
        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .row>* {
            flex: 1;
            min-width: 150px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-magenta));
            color: black;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            z-index: 999;
            box-shadow: 0 0 20px var(--neon-cyan);
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
        /* Colour Plate & Text Format unchanged */
        .palette-type-label {
            text-align: center;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .color-squares-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            margin: 16px 0;
        }
        .color-square {
            width: 95px;
            height: 95px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            transition: 0.25s;
            border: 2px solid transparent;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .color-square:hover {
            transform: translateY(-6px) scale(1.06);
            border-color: white;
            box-shadow: 0 8px 30px rgba(255, 255, 255, 0.3);
            z-index: 2;
        }
        .color-square .hex-label {
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            pointer-events: none;
        }
        .text-format-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            margin-top: 12px;
        }
        .text-format-card {
            background: rgba(20, 20, 45, 0.7);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .text-format-card:hover {
            border-color: var(--neon-lime);
            box-shadow: 0 0 22px rgba(57, 255, 20, 0.25);
        }
        .text-format-card .style-name {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-lime);
            margin-bottom: 4px;
        }
        .text-format-card .preview-heading {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.3;
        }
        .text-format-card .preview-body {
            font-size: 0.85rem;
            line-height: 1.5;
            color: #ccc;
            margin: 0;
        }
        .text-format-card .copy-style-btn {
            align-self: flex-start;
            font-size: 0.7rem;
            padding: 8px 16px;
            margin: 0;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="toastContainer"></div>

    <script>
        const app = document.getElementById('app');
        const categories = [
            { id: 'text', icon: '🔤', name: 'Text & Encode', desc: 'Encode, decode, generate text' },
            { id: 'design', icon: '🎨', name: 'CSS & Design', desc: 'Gradients, shadows, colors, flexbox' },
            { id: 'code', icon: '💻', name: 'Code Tools', desc: 'JSON, minifiers, regex, diff' },
            { id: 'security', icon: '🔐', name: 'Security', desc: 'Passwords, hashing' },
            { id: 'qrbarcode', icon: '📱', name: 'QR & Barcode', desc: 'Generate and read QR codes & barcodes' }
        ];
        const tools = {
            text: [
                { id: 'base64', emoji: '🔣', title: 'Base64 Encoder/Decoder' },
                { id: 'urlencode', emoji: '🔗', title: 'URL Encoder/Decoder' },
                { id: 'wordcounter', emoji: '📝', title: 'Word & Character Counter' },
                { id: 'lorem', emoji: '📄', title: 'Lorem Ipsum Generator' },
                { id: 'uuid', emoji: '🆔', title: 'UUID Generator' }
            ],
            design: [
                { id: 'gradient', emoji: '🌈', title: 'Gradient Generator' },
                { id: 'boxshadow', emoji: '🔲', title: 'Box Shadow Generator' },
                { id: 'colorpicker', emoji: '🎯', title: 'Color Picker & Convert' },
                { id: 'contrast', emoji: '⚫', title: 'Contrast Checker' },
                { id: 'flexbox', emoji: '🧱', title: 'Flexbox Playground' },
                { id: 'colorplate', emoji: '🎨', title: 'Colour Plate' },
                { id: 'textformat', emoji: '✨', title: 'Text Format Chooser' }
            ],
            code: [
                { id: 'jsonfmt', emoji: '📋', title: 'JSON Formatter' },
                { id: 'cssmin', emoji: '🗜️', title: 'CSS Minifier' },
                { id: 'jsmin', emoji: '⚡', title: 'JavaScript Minifier' },
                { id: 'regex', emoji: '🔍', title: 'Regex Tester' },
                { id: 'diff', emoji: '🔄', title: 'Code Diff Checker' }
            ],
            security: [
                { id: 'password', emoji: '🔑', title: 'Password Generator' },
                { id: 'hash', emoji: '#️⃣', title: 'Hash Generator' }
            ],
            qrbarcode: [
                { id: 'qrgenerator', emoji: '🔳', title: 'QR Code Generator' },
                { id: 'qrreader', emoji: '📷', title: 'QR Code Reader' },
                { id: 'barcodemaker', emoji: '🖨️', title: 'Barcode Maker' },
                { id: 'barcodereader', emoji: '🔎', title: 'Barcode Reader' }
            ]
        };

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => showToast('📋 Copied!'));
        }

        // RENDER HOME
        function renderHome() {
            app.innerHTML = `
                <h1 style="font-size:2.5rem; text-shadow:0 0 20px var(--neon-cyan); margin-bottom:10px;">🚀 DevToolKit Pro</h1>
                <p style="color:#aaa; margin-bottom:30px;">Professional developer utilities</p>
                <div class="category-grid">
                    ${categories.map(c => `
                        <div class="cat-card" data-cat="${c.id}">
                            <div class="icon">${c.icon}</div>
                            <h2>${c.name}</h2>
                            <p>${c.desc}</p>
                        </div>
                    `).join('')}
                </div>`;
            document.querySelectorAll('.cat-card').forEach(card => {
                card.addEventListener('click', () => renderCategory(card.dataset.cat));
            });
        }

        // RENDER CATEGORY
        function renderCategory(catId) {
            const cat = categories.find(c => c.id === catId);
            const toolList = tools[catId];
            app.innerHTML = `
                <button class="back-btn" id="backHomeBtn">⬅ Back to Categories</button>
                <h2 style="font-size:1.8rem; text-shadow:0 0 12px var(--neon-magenta); margin-bottom:20px;">${cat.icon} ${cat.name}</h2>
                <div class="tool-grid">
                    ${toolList.map(t => `
                        <div class="tool-item" data-tool="${t.id}">
                            <div class="emoji">${t.emoji}</div>
                            <h3>${t.title}</h3>
                        </div>
                    `).join('')}
                </div>`;
            document.getElementById('backHomeBtn').addEventListener('click', renderHome);
            document.querySelectorAll('.tool-item').forEach(item => {
                item.addEventListener('click', () => renderTool(catId, item.dataset.tool));
            });
        }

        // RENDER TOOL
        function renderTool(catId, toolId) {
            const cat = categories.find(c => c.id === catId);
            const tool = tools[catId].find(t => t.id === toolId);
            app.innerHTML = `
                <button class="back-btn" id="backCatBtn">⬅ Back to ${cat.name}</button>
                <h2 style="font-size:1.5rem; text-shadow:0 0 10px var(--neon-lime); margin-bottom:15px;">${tool.emoji} ${tool.title}</h2>
                <div class="detail-card" id="toolContainer"></div>`;
            document.getElementById('backCatBtn').addEventListener('click', () => renderCategory(catId));
            loadTool(toolId);
        }

        function loadTool(toolId) {
            const container = document.getElementById('toolContainer');
            switch (toolId) {
                case 'base64': base64Tool(container); break;
                case 'urlencode': urlTool(container); break;
                case 'wordcounter': wordCounterTool(container); break;
                case 'lorem': loremTool(container); break;
                case 'uuid': uuidTool(container); break;
                case 'gradient': gradientTool(container); break;
                case 'boxshadow': boxShadowTool(container); break;
                case 'colorpicker': colorPickerTool(container); break;
                case 'contrast': contrastTool(container); break;
                case 'flexbox': flexboxTool(container); break;
                case 'colorplate': colorPlateTool(container); break;
                case 'textformat': textFormatTool(container); break;
                case 'jsonfmt': jsonTool(container); break;
                case 'cssmin': cssMinTool(container); break;
                case 'jsmin': jsMinTool(container); break;
                case 'regex': regexTool(container); break;
                case 'diff': diffTool(container); break;
                case 'password': passwordTool(container); break;
                case 'hash': hashTool(container); break;
                case 'qrgenerator': qrGeneratorTool(container); break;
                case 'qrreader': qrReaderTool(container); break;
                case 'barcodemaker': barcodeMakerTool(container); break;
                case 'barcodereader': barcodeReaderTool(container); break;
            }
        }

        // ---------- EXISTING TOOL FUNCTIONS (unchanged) ----------
        function base64Tool(c) {
            c.innerHTML = `
                <label>Input Text</label>
                <textarea id="b64In" placeholder="Enter text to encode or Base64 string to decode..."></textarea>
                <div class="row">
                    <button id="b64Encode">🔒 Encode</button>
                    <button id="b64Decode" class="outline-btn">🔓 Decode</button>
                    <button id="b64Clear" class="outline-btn">Clear</button>
                </div>
                <label>Output</label>
                <div class="output-box" id="b64Out"></div>
                <button class="outline-btn" id="b64Copy">📋 Copy</button>`;
            document.getElementById('b64Encode').onclick = () => {
                try { document.getElementById('b64Out').textContent = btoa(unescape(encodeURIComponent(document.getElementById('b64In').value))); } 
                catch (e) { document.getElementById('b64Out').textContent = 'Error: ' + e.message; }
            };
            document.getElementById('b64Decode').onclick = () => {
                try { document.getElementById('b64Out').textContent = decodeURIComponent(escape(atob(document.getElementById('b64In').value.trim()))); } 
                catch (e) { document.getElementById('b64Out').textContent = 'Error: Invalid Base64'; }
            };
            document.getElementById('b64Clear').onclick = () => { document.getElementById('b64In').value = ''; document.getElementById('b64Out').textContent = ''; };
            document.getElementById('b64Copy').onclick = () => copyText(document.getElementById('b64Out').textContent);
        }

        function urlTool(c) {
            c.innerHTML = `
                <label>Input Text</label>
                <textarea id="urlIn" placeholder="Enter text or URL to encode/decode..."></textarea>
                <div class="row">
                    <button id="urlEncode">🔗 Encode URL</button>
                    <button id="urlDecode" class="outline-btn">🔓 Decode URL</button>
                </div>
                <label>Output</label>
                <div class="output-box" id="urlOut"></div>
                <button class="outline-btn" id="urlCopy">📋 Copy</button>`;
            document.getElementById('urlEncode').onclick = () => document.getElementById('urlOut').textContent = encodeURIComponent(document.getElementById('urlIn').value);
            document.getElementById('urlDecode').onclick = () => {
                try { document.getElementById('urlOut').textContent = decodeURIComponent(document.getElementById('urlIn').value); } 
                catch (e) { document.getElementById('urlOut').textContent = 'Error: Invalid URL encoding'; }
            };
            document.getElementById('urlCopy').onclick = () => copyText(document.getElementById('urlOut').textContent);
        }

        function wordCounterTool(c) {
            c.innerHTML = `
                <label>Your Text</label>
                <textarea id="wcIn" placeholder="Type or paste your text here..."></textarea>
                <div class="row" style="margin-top:10px;">
                    <div><strong id="wcWords">0</strong> Words</div>
                    <div><strong id="wcChars">0</strong> Characters</div>
                    <div><strong id="wcCharsNoSpace">0</strong> Chars (no spaces)</div>
                    <div><strong id="wcLines">0</strong> Lines</div>
                    <div><strong id="wcSentences">0</strong> Sentences</div>
                </div>`;
            document.getElementById('wcIn').addEventListener('input', () => {
                const text = document.getElementById('wcIn').value;
                document.getElementById('wcChars').textContent = text.length;
                document.getElementById('wcCharsNoSpace').textContent = text.replace(/\s/g, '').length;
                document.getElementById('wcWords').textContent = text.trim() ? text.trim().split(/\s+/).length : 0;
                document.getElementById('wcLines').textContent = text.split(/\n/).length;
                document.getElementById('wcSentences').textContent = text.split(/[.!?]+/).filter(Boolean).length;
            });
        }

        function loremTool(c) {
            c.innerHTML = `
                <div class="row">
                    <div><label>Paragraphs</label><input type="number" id="loremCount" value="3" min="1" max="20"></div>
                    <div><label>Type</label><select id="loremType"><option value="paragraphs">Paragraphs</option><option value="sentences">Sentences</option><option value="words">Words</option></select></div>
                </div>
                <button id="loremGen">Generate</button>
                <div class="output-box" id="loremOut"></div>
                <button class="outline-btn" id="loremCopy">📋 Copy</button>`;
            const words = "Lorem ipsum dolor sit amet consectetur adipisicing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua ut enim ad minim veniam quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur excepteur sint occaecat cupidatat non proident sunt in culpa qui officia deserunt mollit anim id est laborum".split(' ');
            function generate() {
                const count = +document.getElementById('loremCount').value || 3;
                const type = document.getElementById('loremType').value;
                let res = '';
                if (type === 'paragraphs') {
                    for (let i = 0; i < count; i++) {
                        const p = [...words].sort(() => Math.random() - 0.5).slice(0, 30 + Math.floor(Math.random() * 40));
                        res += p.join(' ').charAt(0).toUpperCase() + p.join(' ').slice(1) + '.\n\n';
                    }
                } else if (type === 'sentences') {
                    for (let i = 0; i < count; i++) {
                        const s = [...words].sort(() => Math.random() - 0.5).slice(0, 8 + Math.floor(Math.random() * 12));
                        res += s.join(' ').charAt(0).toUpperCase() + s.join(' ').slice(1) + '. ';
                    }
                } else {
                    res = [...words].sort(() => Math.random() - 0.5).slice(0, count).join(' ');
                }
                document.getElementById('loremOut').textContent = res.trim();
            }
            document.getElementById('loremGen').onclick = generate;
            document.getElementById('loremCopy').onclick = () => copyText(document.getElementById('loremOut').textContent);
            generate();
        }

        function uuidTool(c) {
            c.innerHTML = `
                <button id="uuidGen">🎲 Generate UUIDs</button>
                <label>Count</label>
                <input type="number" id="uuidCount" value="5" min="1" max="50" style="width:100px;">
                <div class="output-box" id="uuidOut"></div>
                <button class="outline-btn" id="uuidCopy">📋 Copy All</button>`;
            function generate() {
                const count = +document.getElementById('uuidCount').value || 5;
                let res = '';
                for (let i = 0; i < count; i++) {
                    res += 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                        const r = Math.random() * 16 | 0;
                        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
                    }) + '\n';
                }
                document.getElementById('uuidOut').textContent = res.trim();
            }
            document.getElementById('uuidGen').onclick = generate;
            document.getElementById('uuidCopy').onclick = () => copyText(document.getElementById('uuidOut').textContent);
            generate();
        }

        function gradientTool(c) {
            c.innerHTML = `
                <div class="output-box" id="gradPreview" style="height:100px;"></div>
                <div class="row">
                    <div><label>Color 1</label><input type="color" id="gc1" value="#ff00ff"></div>
                    <div><label>Color 2</label><input type="color" id="gc2" value="#00ffff"></div>
                    <div><label>Direction</label><select id="gdir">
                        <option value="to right">➡ Right</option><option value="to left">⬅ Left</option>
                        <option value="to bottom">⬇ Bottom</option><option value="to top">⬆ Top</option>
                        <option value="to bottom right">↘ Bottom Right</option>

            document.getElementById('cpHex').oninput = function(){ if(/^#[0-9a-fA-F]{6}$/.test(this.value)){ document.getElementById('cpColor').value = this.value; update(); } };

                    case 'cool': for(let i=0;i<5;i++){ const h=180+(i*18)%120; const s=50+Math.floor(Math.random()*40); const l=30+Math.floor(Math.random()*35); colors.push(hslToHex(h%360,s,l)); } break;
                    case 'pastel': for(let i=0;i<5;i++){ const h=(baseHue+i*55)%360; const s=25+Math.floor(Math.random()*25); const l=65+Math.floor(Math.random()*20); colors.push(hslToHex(h,s,l)); } break;
                    case 'vibrant': for(let i=0;i<5;i++){ const h=(baseHue+i*42)%360; const s=75+Math.floor(Math.random()*25); const l=40+Math.floor(Math.random()*20); colors.push(hslToHex(h,s,l)); } break;
                    case 'earthy': const earthyHues=[20,30,40,80,120,160,200,25,45,100]; for(let i=0;i<5;i++){ const h=earthyHues[Math.floor(Math.random()*earthyHues.length)]; const s=20+Math.floor(Math.random()*30); const l=25+Math.floor(Math.random()*30); colors.push(hslToHex(h,s,l)); } break;
                    case 'monochromatic': const monoHue=baseHue; for(let i=0;i<5;i++){ const s=30+Math.floor(Math.random()*50); const l=20+i*14; colors.push(hslToHex(monoHue,s,Math.min(l,85))); } break;
                    case 'complementary': const compHue1=baseHue; const compHue2=(baseHue+180)%360; colors.push(hslToHex(compHue1,70,45)); colors.push(hslToHex(compHue1,55,55)); colors.push(hslToHex(compHue2,70,45)); colors.push(hslToHex(compHue2,55,55)); colors.push(hslToHex(compHue1,40,65)); break;
                    case 'analogous': for(let i=0;i<5;i++){ const h=(baseHue+i*18-36)%360; const s=55+Math.floor(Math.random()*30); const l=35+Math.floor(Math.random()*30); colors.push(hslToHex(h<0?h+360:h,s,l)); } break;
                    case 'triadic': for(let i=0;i<3;i++){ const h=(baseHue+i*120)%360; colors.push(hslToHex(h,65,42)); if(colors.length<5) colors.push(hslToHex(h,45,58)); } colors.splice(5); break;
                    default: for(let i=0;i<5;i++){ const h=(baseHue+i*28+Math.floor(Math.random()*20))%360; const s=40+Math.floor(Math.random()*50); const l=30+Math.floor(Math.random()*35); colors.push(hslToHex(h,s,l)); } break;
                }
                return {type, colors: colors.slice(0,5)};
            }
            function hslToHex(h,s,l){ s/=100;l/=100; const a=s*Math.min(l,1-l); const f=n=>{ const k=(n+h/30)%12; const color=l-a*Math.max(Math.min(k-3,9-k,1),-1); return Math.round(255*color).toString(16).padStart(2,'0'); }; return `#${f(0)}${f(8)}${f(4)}`; }
            const paletteTypeNames = { warm:'Warm Tones', cool:'Cool Blues & Purples', pastel:'Pastel Dreams', vibrant:'Vibrant Pop', earthy:'Earthy Natural', monochromatic:'Monochromatic Depth', complementary:'Complementary Contrast', analogous:'Analogous Harmony', triadic:'Triadic Balance', 'random-harmonious':'Random Harmony' };
            let currentPalette = generatePalette();
            function renderPalette() {
                const paletteContainer = document.getElementById('paletteContainer');
                const typeLabel = document.getElementById('paletteTypeLabel');
                typeLabel.textContent = '🎨 ' + (paletteTypeNames[currentPalette.type] || currentPalette.type);
                paletteContainer.innerHTML = currentPalette.colors.map(color => `<div class="color-square" style="background:${color};" data-color="${color}" title="Click to copy ${color}"><span class="hex-label">${color}</span></div>`).join('');
                paletteContainer.querySelectorAll('.color-square').forEach(sq => sq.addEventListener('click', () => copyText(sq.dataset.color)));
            }
            c.innerHTML = `
                <p class="palette-type-label" id="paletteTypeLabel">🎨 Palette</p>
                <div class="color-squares-row" id="paletteContainer"></div>
                <div style="display:flex;justify-content:center;align-items:center;gap:16px;margin-top:16px;flex-wrap:wrap;">
                    <button id="paletteCopyBtn" class="outline-btn">📋 Copy All Colors</button>
                    <button id="paletteRefreshBtn">🔄 Refresh</button>
                </div>
                <div class="output-box" id="paletteCodeOut" style="margin-top:12px;text-align:center;"></div>
                <button class="outline-btn" id="paletteCopyCSS" style="display:block;margin:8px auto;">📋 Copy as CSS Variables</button>
            `;
            renderPalette();
            function updatePaletteOutput() {
                const codeOut = document.getElementById('paletteCodeOut');
                const hexList = currentPalette.colors.join(', ');
                const cssVars = currentPalette.colors.map((c,i) => `--color-${i+1}: ${c};`).join('\n');
                codeOut.innerHTML = `<strong>HEX:</strong> ${hexList}<br><br><strong>CSS Variables:</strong><br>${cssVars}`;
            }
            updatePaletteOutput();
            document.getElementById('paletteRefreshBtn').onclick = () => { currentPalette = generatePalette(); renderPalette(); updatePaletteOutput(); showToast('🎨 New palette generated!'); };
            document.getElementById('paletteCopyBtn').onclick = () => copyText(currentPalette.colors.join(', '));
            document.getElementById('paletteCopyCSS').onclick = () => copyText(currentPalette.colors.map((c,i) => `--color-${i+1}: ${c};`).join('\n'));
        }

        function textFormatTool(c) {
            const textStyles = [
                { id:'neon-glow', name:'Neon Glow', bestFor:'Headings & Hero Text', headingCSS:'color: #fff; text-shadow: 0 0 7px #00ffff, 0 0 10px #00ffff, 0 0 21px #00ffff, 0 0 42px #00ffff, 0 0 82px #00ffff, 0 0 92px #00ffff; font-weight: 700; letter-spacing: 2px;', bodyCSS:'color: #e0f7fa; text-shadow: 0 0 4px rgba(0,255,255,0.5); font-weight: 400;', headingPreview:'NEON DREAMS', bodyPreview:'A radiant glow that cuts through the dark, perfect for futuristic interfaces.' },
                { id:'gradient-clip', name:'Gradient Clip', bestFor:'Headings & Brand Text', headingCSS:'background: linear-gradient(135deg, #ff00ff, #00ffff, #ff6600); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 800; letter-spacing: 1px;', bodyCSS:'background: linear-gradient(135deg, #ff00ff, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 600;', headingPreview:'Gradient Magic', bodyPreview:'Smooth color transitions clipped right into your text, giving it a vibrant modern look.' },
                { id:'three-d-block', name:'3D Block Shadow', bestFor:'Headings & Posters', headingCSS:'color: #fff; text-shadow: 1px 1px 0 #ff00ff, 2px 2px 0 #ff00ff, 3px 3px 0 #ff00ff, 4px 4px 0 #ff00ff, 5px 5px 0 #ff00ff, 6px 6px 10px rgba(0,0,0,0.5); font-weight: 900; letter-spacing: 3px; text-transform: uppercase;', bodyCSS:'color: #ddd; text-shadow: 1px 1px 2px rgba(255,0,255,0.4); font-weight: 500;', headingPreview:'BOLD IMPACT', bodyPreview:'A heavy 3D extrusion effect that makes your headings jump off the page.' },
                { id:'minimal-elegant', name:'Minimal Elegant', bestFor:'Body Text & Paragraphs', headingCSS:'color: #f0f0f0; font-weight: 300; letter-spacing: 6px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 8px; display: inline-block;', bodyCSS:'color: #c0c0d0; font-weight: 300; line-height: 1.8; letter-spacing: 0.5px;', headingPreview:'ELEGANCE', bodyPreview:'Clean, airy, and sophisticated. This style speaks softly but carries immense refinement.' },
                { id:'retro-typewriter', name:'Retro Typewriter', bestFor:'Blog Text & Vintage UI', headingCSS:"font-family: 'Courier New', Courier, monospace; color: #f5deb3; text-shadow: 2px 2px 0 rgba(0,0,0,0.6); letter-spacing: 2px; font-weight: 700; background: rgba(30,20,10,0.4); padding: 6px 14px; border-radius: 4px; display: inline-block;", bodyCSS:"font-family: 'Courier New', Courier, monospace; color: #d4c5a9; line-height: 1.7; letter-spacing: 1px;", headingPreview:'VINTAGE TYPE', bodyPreview:'Warm paper-like tones and monospace charm bring the nostalgic feel of old typewriters.' },
                { id:'outline-pop', name:'Outline Stroke Pop', bestFor:'Headings & Callouts', headingCSS:'color: transparent; -webkit-text-stroke: 2px #ff00ff; text-stroke: 2px #ff00ff; font-weight: 900; letter-spacing: 4px; text-transform: uppercase;', bodyCSS:'color: #ddd; -webkit-text-stroke: 0.5px rgba(255,0,255,0.3); font-weight: 500;', headingPreview:'OUTLINED', bodyPreview:'Bold outlined text that creates a striking visual with its hollow, graphic-design feel.' },
                { id:'soft-shadow-modern', name:'Soft Shadow Modern', bestFor:'Card Headings & UI Text', headingCSS:'color: #ffffff; text-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 0 40px rgba(255,255,255,0.15); font-weight: 600; letter-spacing: 1px;', bodyCSS:'color: #bbb; text-shadow: 0 1px 3px rgba(0,0,0,0.4); font-weight: 400; line-height: 1.6;', headingPreview:'Smooth & Soft', bodyPreview:'Gentle shadows add depth without distraction, ideal for modern card-based layouts.' },
                { id:'vibrant-highlight', name:'Vibrant Highlight', bestFor:'Emphasis & Annotations', headingCSS:'color: #1a1a2e; background: linear-gradient(120deg, #39ff14 0%, #39ff14 100%); background-repeat: no-repeat; background-size: 100% 55%; background-position: 0 85%; padding: 0 8px; font-weight: 700; display: inline-block;', bodyCSS:'color: #e0e0ff; background: linear-gradient(120deg, rgba(57,255,20,0.25) 0%, rgba(57,255,20,0.15) 100%); background-repeat: no-repeat; background-size: 100% 30%; background-position: 0 90%; padding: 0 4px; display: inline;', headingPreview:'HIGHLIGHTED', bodyPreview:'A vibrant highlighter effect that draws the eye, perfect for emphasizing key phrases.' }
            ];
            c.innerHTML = `
                <p style="color:#aaa;margin-bottom:4px;text-align:center;">✨ Unique text formatting styles for headings & body text</p>
                <p style="color:#666;font-size:0.7rem;text-align:center;margin-bottom:16px;">Each card shows a live preview — click <strong>Copy CSS</strong> to grab the style code</p>
                <div class="text-format-grid">
                    ${textStyles.map((style,index) => `
                        <div class="text-format-card">
                            <div class="style-name">✨ ${style.name} <span style="color:#888;font-size:0.65rem;">— ${style.bestFor}</span></div>
                            <div class="preview-heading" style="${style.headingCSS.replace(/\n/g,' ')}">${style.headingPreview}</div>
                            <div class="preview-body" style="${style.bodyCSS.replace(/\n/g,' ')}">${style.bodyPreview}</div>
                            <button class="copy-style-btn outline-btn" data-index="${index}">📋 Copy CSS</button>
                        </div>
                    `).join('')}
                </div>
            `;
            c.querySelectorAll('.copy-style-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.index);
                    const style = textStyles[idx];
                    const fullCSS = `/* ${style.name} — ${style.bestFor} */\n/* Heading Style */\n.heading {\n    ${style.headingCSS.trim().replace(/\n/g,'\n    ')}\n}\n\n/* Body Text Style */\n.body-text {\n    ${style.bodyCSS.trim().replace(/\n/g,'\n    ')}\n}`;
                    copyText(fullCSS);
                    showToast(`📋 ${style.name} CSS copied!`);
                });
            });
        }

        // Start application
        renderHome();
    </script>
