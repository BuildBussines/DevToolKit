<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevToolKit Pro · Neon Developer Tools</title>
    <style>
        :root {
            --bg: #050510;
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-lime: #39ff14;
            --neon-yellow: #ffff00;
            --neon-orange: #ff6600;
            --card-bg: rgba(10, 10, 30, 0.8);
            --border: rgba(255, 255, 255, 0.15);
            --text: #e0e0ff;
            --shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at 50% 50%, #0a0a2e, #020210);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }
        #app {
            width: 100%;
            max-width: 900px;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Category cards */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            width: 100%;
            margin-top: 30px;
        }
        .cat-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
        }
        .cat-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px var(--neon-cyan), 0 0 60px rgba(255, 0, 255, 0.4);
        }
        .cat-card .icon { font-size: 3.5rem; filter: drop-shadow(0 0 10px var(--neon-cyan)); }
        .cat-card h2 { margin: 10px 0 5px; font-size: 1.5rem; text-shadow: 0 0 8px var(--neon-cyan); }
        .cat-card p { font-size: 0.9rem; color: #aaa; }
        /* Back button */
        .back-btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            transition: 0.3s;
            text-shadow: 0 0 5px var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0,255,255,0.4);
        }
        .back-btn:hover { background: rgba(0,255,255,0.15); box-shadow: 0 0 25px var(--neon-cyan); }
        /* Tool grid */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
            width: 100%;
        }
        .tool-item {
            background: rgba(20, 20, 40, 0.7);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .tool-item:hover {
            border-color: var(--neon-magenta);
            box-shadow: 0 0 20px var(--neon-magenta);
            transform: translateY(-3px);
        }
        .tool-item .emoji { font-size: 2rem; filter: drop-shadow(0 0 6px var(--neon-magenta)); }
        .tool-item h3 { margin: 8px 0 4px; font-size: 1rem; }
        /* Detail card */
        .detail-card {
            background: rgba(15, 15, 35, 0.8);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            box-shadow: 0 0 25px rgba(0,255,255,0.2);
        }
        textarea, input, select {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-family: monospace;
            margin: 8px 0;
            outline: none;
            transition: 0.2s;
        }
        textarea:focus, input:focus, select:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0,255,255,0.4);
        }
        textarea { min-height: 120px; resize: vertical; }
        label { display: block; margin-top: 10px; font-size: 0.8rem; color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 1px; }
        button {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
            border: none; color: black; padding: 12px 24px; border-radius: 30px;
            font-weight: bold; cursor: pointer; transition: 0.3s; margin: 5px;
            box-shadow: 0 0 15px rgba(0,255,255,0.5); text-transform: uppercase;
        }
        button:hover { filter: brightness(1.2); transform: scale(1.03); }
        .outline-btn {
            background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
            box-shadow: none; text-shadow: 0 0 5px var(--neon-cyan);
        }
        .output-box {
            background: black; border: 1px solid var(--neon-magenta);
            border-radius: 10px; padding: 16px; font-family: monospace;
            min-height: 80px; max-height: 300px; overflow-y: auto;
            white-space: pre-wrap; color: #ddd; margin: 10px 0;
            box-shadow: 0 0 15px rgba(255,0,255,0.3);
        }
        .row { display: flex; gap: 12px; flex-wrap: wrap; }
        .row > * { flex: 1; min-width: 150px; }
        .toast {
            position: fixed; bottom: 30px; right: 30px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-magenta));
            color: black; padding: 12px 24px; border-radius: 30px;
            font-weight: bold; z-index: 999; box-shadow: 0 0 20px var(--neon-cyan);
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="toastContainer"></div>

    <script>
        const app = document.getElementById('app');
        const categories = [
            { id: 'text', icon: '📝', name: 'Text & Encode', desc: 'Encode, decode, generate text' },
            { id: 'design', icon: '🎨', name: 'CSS & Design', desc: 'Gradients, shadows, colors, flexbox' },
            { id: 'code', icon: '⚡', name: 'Code Tools', desc: 'JSON, minifiers, regex, diff' },
            { id: 'security', icon: '🔒', name: 'Security', desc: 'Passwords, hashing' }
        ];
        const tools = {
            text: [
                { id:'base64', emoji:'🔐', title:'Base64 Encoder/Decoder' },
                { id:'urlencode', emoji:'🔗', title:'URL Encoder/Decoder' },
                { id:'wordcounter', emoji:'📊', title:'Word & Character Counter' },
                { id:'lorem', emoji:'📄', title:'Lorem Ipsum Generator' },
                { id:'uuid', emoji:'🆔', title:'UUID Generator' }
            ],
            design: [
                { id:'gradient', emoji:'🌈', title:'Gradient Generator' },
                { id:'boxshadow', emoji:'🔲', title:'Box Shadow Generator' },
                { id:'colorpicker', emoji:'🎯', title:'Color Picker & Convert' },
                { id:'contrast', emoji:'👁️', title:'Contrast Checker' },
                { id:'flexbox', emoji:'📐', title:'Flexbox Playground' }
            ],
            code: [
                { id:'jsonfmt', emoji:'📋', title:'JSON Formatter' },
                { id:'cssmin', emoji:'🗜️', title:'CSS Minifier' },
                { id:'jsmin', emoji:'⚙️', title:'JavaScript Minifier' },
                { id:'regex', emoji:'🔍', title:'Regex Tester' },
                { id:'diff', emoji:'🔄', title:'Code Diff Checker' }
            ],
            security: [
                { id:'password', emoji:'🔑', title:'Password Generator' },
                { id:'hash', emoji:'#️⃣', title:'Hash Generator' }
            ]
        };

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => showToast('✅ Copied!'));
        }

        // RENDER HOME
        function renderHome() {
            app.innerHTML = `
                <h1 style="font-size:2.5rem; text-shadow:0 0 20px var(--neon-cyan); margin-bottom:10px;">🛠️ DevToolKit Pro</h1>
                <p style="color:#aaa; margin-bottom:30px;">Professional developer utilities</p>
                <div class="category-grid">
                    ${categories.map(c => `
                        <div class="cat-card" data-cat="${c.id}">
                            <div class="icon">${c.icon}</div>
                            <h2>${c.name}</h2>
                            <p>${c.desc}</p>
                        </div>
                    `).join('')}
                </div>`;
            document.querySelectorAll('.cat-card').forEach(card => {
                card.addEventListener('click', () => renderCategory(card.dataset.cat));
            });
        }

        // RENDER CATEGORY
        function renderCategory(catId) {
            const cat = categories.find(c => c.id === catId);
            const toolList = tools[catId];
            app.innerHTML = `
                <button class="back-btn" id="backHomeBtn">← Back to Categories</button>
                <h2 style="font-size:1.8rem; text-shadow:0 0 12px var(--neon-magenta); margin-bottom:20px;">${cat.icon} ${cat.name}</h2>
                <div class="tool-grid">
                    ${toolList.map(t => `
                        <div class="tool-item" data-tool="${t.id}">
                            <div class="emoji">${t.emoji}</div>
                            <h3>${t.title}</h3>
                        </div>
                    `).join('')}
                </div>`;
            document.getElementById('backHomeBtn').addEventListener('click', renderHome);
            document.querySelectorAll('.tool-item').forEach(item => {
                item.addEventListener('click', () => renderTool(catId, item.dataset.tool));
            });
        }

        // RENDER TOOL
        function renderTool(catId, toolId) {
            const cat = categories.find(c => c.id === catId);
            const tool = tools[catId].find(t => t.id === toolId);
            app.innerHTML = `
                <button class="back-btn" id="backCatBtn">← Back to ${cat.name}</button>
                <h2 style="font-size:1.5rem; text-shadow:0 0 10px var(--neon-lime); margin-bottom:15px;">${tool.emoji} ${tool.title}</h2>
                <div class="detail-card" id="toolContainer"></div>`;
            document.getElementById('backCatBtn').addEventListener('click', () => renderCategory(catId));
            loadTool(toolId);
        }

        function loadTool(toolId) {
            const container = document.getElementById('toolContainer');
            switch(toolId) {
                case 'base64': base64Tool(container); break;
                case 'urlencode': urlTool(container); break;
                case 'wordcounter': wordCounterTool(container); break;
                case 'lorem': loremTool(container); break;
                case 'uuid': uuidTool(container); break;
                case 'gradient': gradientTool(container); break;
                case 'boxshadow': boxShadowTool(container); break;
                case 'colorpicker': colorPickerTool(container); break;
                case 'contrast': contrastTool(container); break;
                case 'flexbox': flexboxTool(container); break;
                case 'jsonfmt': jsonTool(container); break;
                case 'cssmin': cssMinTool(container); break;
                case 'jsmin': jsMinTool(container); break;
                case 'regex': regexTool(container); break;
                case 'diff': diffTool(container); break;
                case 'password': passwordTool(container); break;
                case 'hash': hashTool(container); break;
            }
        }

        // ---------- TOOL FUNCTIONS (NO QUESTION MARKS IN PLACEHOLDERS/LABELS) ----------
        function base64Tool(c) {
            c.innerHTML = `
                <label>Input Text</label>
                <textarea id="b64In" placeholder="Enter text to encode or Base64 string to decode..."></textarea>
                <div class="row">
                    <button id="b64Encode">🔒 Encode</button>
                    <button id="b64Decode" class="outline-btn">🔓 Decode</button>
                    <button id="b64Clear" class="outline-btn">Clear</button>
                </div>
                <label>Output</label>
                <div class="output-box" id="b64Out"></div>
                <button class="outline-btn" id="b64Copy">📋 Copy</button>`;
            document.getElementById('b64Encode').onclick = () => {
                try { document.getElementById('b64Out').textContent = btoa(unescape(encodeURIComponent(document.getElementById('b64In').value))); }
                catch(e) { document.getElementById('b64Out').textContent = 'Error: ' + e.message; }
            };
            document.getElementById('b64Decode').onclick = () => {
                try { document.getElementById('b64Out').textContent = decodeURIComponent(escape(atob(document.getElementById('b64In').value.trim()))); }
                catch(e) { document.getElementById('b64Out').textContent = 'Error: Invalid Base64'; }
            };
            document.getElementById('b64Clear').onclick = () => { document.getElementById('b64In').value = ''; document.getElementById('b64Out').textContent = ''; };
            document.getElementById('b64Copy').onclick = () => copyText(document.getElementById('b64Out').textContent);
        }

        function urlTool(c) {
            c.innerHTML = `
                <label>Input Text</label>
                <textarea id="urlIn" placeholder="Enter text or URL to encode/decode..."></textarea>
                <div class="row">
                    <button id="urlEncode">🔒 Encode URL</button>
                    <button id="urlDecode" class="outline-btn">🔓 Decode URL</button>
                </div>
                <label>Output</label>
                <div class="output-box" id="urlOut"></div>
                <button class="outline-btn" id="urlCopy">📋 Copy</button>`;
            document.getElementById('urlEncode').onclick = () => document.getElementById('urlOut').textContent = encodeURIComponent(document.getElementById('urlIn').value);
            document.getElementById('urlDecode').onclick = () => {
                try { document.getElementById('urlOut').textContent = decodeURIComponent(document.getElementById('urlIn').value); }
                catch(e) { document.getElementById('urlOut').textContent = 'Error: Invalid URL encoding'; }
            };
            document.getElementById('urlCopy').onclick = () => copyText(document.getElementById('urlOut').textContent);
        }

        function wordCounterTool(c) {
            c.innerHTML = `
                <label>Your Text</label>
                <textarea id="wcIn" placeholder="Type or paste your text here..."></textarea>
                <div class="row" style="margin-top:10px;">
                    <div><strong id="wcWords">0</strong> Words</div>
                    <div><strong id="wcChars">0</strong> Characters</div>
                    <div><strong id="wcCharsNoSpace">0</strong> Chars (no spaces)</div>
                    <div><strong id="wcLines">0</strong> Lines</div>
                    <div><strong id="wcSentences">0</strong> Sentences</div>
                </div>`;
            document.getElementById('wcIn').addEventListener('input', () => {
                const text = document.getElementById('wcIn').value;
                document.getElementById('wcChars').textContent = text.length;
                document.getElementById('wcCharsNoSpace').textContent = text.replace(/\s/g, '').length;
                document.getElementById('wcWords').textContent = text.trim() ? text.trim().split(/\s+/).length : 0;
                document.getElementById('wcLines').textContent = text.split(/\n/).length;
                document.getElementById('wcSentences').textContent = text.split(/[.!?]+/).filter(Boolean).length;
            });
        }

        function loremTool(c) {
            c.innerHTML = `
                <div class="row">
                    <div><label>Paragraphs</label><input type="number" id="loremCount" value="3" min="1" max="20"></div>
                    <div><label>Type</label><select id="loremType"><option value="paragraphs">Paragraphs</option><option value="sentences">Sentences</option><option value="words">Words</option></select></div>
                </div>
                <button id="loremGen">Generate</button>
                <div class="output-box" id="loremOut"></div>
                <button class="outline-btn" id="loremCopy">📋 Copy</button>`;
            const words = "Lorem ipsum dolor sit amet consectetur adipisicing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua ut enim ad minim veniam quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur excepteur sint occaecat cupidatat non proident sunt in culpa qui officia deserunt mollit anim id est laborum".split(' ');
            function generate() {
                const count = +document.getElementById('loremCount').value || 3;
                const type = document.getElementById('loremType').value;
                let res = '';
                if (type === 'paragraphs') {
                    for (let i = 0; i < count; i++) {
                        const p = [...words].sort(() => Math.random() - 0.5).slice(0, 30 + Math.floor(Math.random() * 40));
                        res += p.join(' ').charAt(0).toUpperCase() + p.join(' ').slice(1) + '.\n\n';
                    }
                } else if (type === 'sentences') {
                    for (let i = 0; i < count; i++) {
                        const s = [...words].sort(() => Math.random() - 0.5).slice(0, 8 + Math.floor(Math.random() * 12));
                        res += s.join(' ').charAt(0).toUpperCase() + s.join(' ').slice(1) + '. ';
                    }
                } else {
                    res = [...words].sort(() => Math.random() - 0.5).slice(0, count).join(' ');
                }
                document.getElementById('loremOut').textContent = res.trim();
            }
            document.getElementById('loremGen').onclick = generate;
            document.getElementById('loremCopy').onclick = () => copyText(document.getElementById('loremOut').textContent);
            generate();
        }

        function uuidTool(c) {
            c.innerHTML = `
                <button id="uuidGen">🎲 Generate UUIDs</button>
                <label>Count</label>
                <input type="number" id="uuidCount" value="5" min="1" max="50" style="width:100px;">
                <div class="output-box" id="uuidOut"></div>
                <button class="outline-btn" id="uuidCopy">📋 Copy All</button>`;
            function generate() {
                const count = +document.getElementById('uuidCount').value || 5;
                let res = '';
                for (let i = 0; i < count; i++) {
                    res += 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                        const r = Math.random() * 16 | 0;
                        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
                    }) + '\n';
                }
                document.getElementById('uuidOut').textContent = res.trim();
            }
            document.getElementById('uuidGen').onclick = generate;
            document.getElementById('uuidCopy').onclick = () => copyText(document.getElementById('uuidOut').textContent);
            generate();
        }

        function gradientTool(c) {
            c.innerHTML = `
                <div class="output-box" id="gradPreview" style="height:100px;"></div>
                <div class="row">
                    <div><label>Color 1</label><input type="color" id="gc1" value="#ff00ff"></div>
                    <div><label>Color 2</label><input type="color" id="gc2" value="#00ffff"></div>
                    <div><label>Direction</label><select id="gdir">
                        <option value="to right">→ Right</option><option value="to left">← Left</option>
                        <option value="to bottom">↓ Bottom</option><option value="to top">↑ Top</option>
                        <option value="to bottom right">↘ Bottom Right</option>
                        <option value="135deg">135°</option><option value="45deg">45°</option><option value="90deg">90°</option>
                    </select></div>
                </div>
                <label>CSS</label>
                <div class="output-box" id="gradCSS"></div>
                <button class="outline-btn" id="gradCopy">📋 Copy</button>`;
            function update() {
                const c1 = document.getElementById('gc1').value, c2 = document.getElementById('gc2').value, dir = document.getElementById('gdir').value;
                const css = `background: linear-gradient(${dir}, ${c1}, ${c2});`;
                document.getElementById('gradPreview').style.background = `linear-gradient(${dir}, ${c1}, ${c2})`;
                document.getElementById('gradCSS').textContent = css;
            }
            ['gc1','gc2','gdir'].forEach(id => document.getElementById(id).addEventListener('input', update));
            document.getElementById('gradCopy').onclick = () => copyText(document.getElementById('gradCSS').textContent);
            update();
        }

        function boxShadowTool(c) {
            c.innerHTML = `
                <div style="display:flex; gap:20px; align-items:center;">
                    <div id="shadowPrev" style="width:120px;height:120px;background:white;border-radius:12px;"></div>
                    <div style="flex:1;">
                        <label>X</label><input type="range" id="bsX" min="-50" max="50" value="5">
                        <label>Y</label><input type="range" id="bsY" min="-50" max="50" value="10">
                        <label>Blur</label><input type="range" id="bsBlur" min="0" max="60" value="20">
                        <label>Spread</label><input type="range" id="bsSpread" min="-20" max="30" value="0">
                        <label>Color</label><input type="color" id="bsColor" value="#ff00ff">
                        <label><input type="checkbox" id="bsInset"> Inset</label>
                    </div>
                </div>
                <label>CSS</label>
                <div class="output-box" id="shadowCSS"></div>
                <button class="outline-btn" id="shadowCopy">📋 Copy</button>`;
            function update() {
                const x = document.getElementById('bsX').value, y = document.getElementById('bsY').value;
                const blur = document.getElementById('bsBlur').value, spread = document.getElementById('bsSpread').value;
                const color = document.getElementById('bsColor').value, inset = document.getElementById('bsInset').checked ? 'inset ' : '';
                const css = `box-shadow: ${inset}${x}px ${y}px ${blur}px ${spread}px ${color};`;
                document.getElementById('shadowPrev').style.boxShadow = css;
                document.getElementById('shadowCSS').textContent = css;
            }
            ['bsX','bsY','bsBlur','bsSpread','bsColor','bsInset'].forEach(id => document.getElementById(id).oninput = update);
            document.getElementById('shadowCopy').onclick = () => copyText(document.getElementById('shadowCSS').textContent);
            update();
        }

        function colorPickerTool(c) {
            c.innerHTML = `
                <div class="row">
                    <div><label>Pick</label><input type="color" id="cpColor" value="#00ffff"></div>
                    <div><label>HEX</label><input type="text" id="cpHex" value="#00ffff"></div>
                    <div><label>RGB</label><input type="text" id="cpRGB" readonly></div>
                    <div><label>HSL</label><input type="text" id="cpHSL" readonly></div>
                </div>`;
            function update() {
                const hex = document.getElementById('cpColor').value;
                document.getElementById('cpHex').value = hex;
                const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
                document.getElementById('cpRGB').value = `rgb(${r}, ${g}, ${b})`;
                const [h,s,l] = rgbToHsl(r,g,b);
                document.getElementById('cpHSL').value = `hsl(${Math.round(h)}, ${Math.round(s)}%, ${Math.round(l)}%)`;
            }
            function rgbToHsl(r,g,b){ r/=255;g/=255;b/=255; const max=Math.max(r,g,b),min=Math.min(r,g,b); let h,s,l=(max+min)/2; if(max===min)h=s=0; else{const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min); switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}} return [h*360,s*100,l*100]; }
            document.getElementById('cpColor').oninput = update;
            document.getElementById('cpHex').oninput = function() { if(/^#[0-9a-fA-F]{6}$/.test(this.value)) { document.getElementById('cpColor').value = this.value; update(); } };
            update();
        }

        function contrastTool(c) {
            c.innerHTML = `
                <div class="row">
                    <div><label>Text</label><input type="color" id="ccText" value="#ffffff"></div>
                    <div><label>Background</label><input type="color" id="ccBg" value="#000000"></div>
                </div>
                <div id="ccPreview" style="padding:30px;border-radius:10px;text-align:center;font-size:1.5rem;font-weight:bold;margin:10px 0;">Sample Text</div>
                <div class="row">
                    <div><strong id="ccRatio">-</strong> Ratio</div>
                    <div><strong id="ccAA">-</strong> AA</div>
                    <div><strong id="ccAAA">-</strong> AAA</div>
                </div>`;
            function update() {
                const tc = document.getElementById('ccText').value, bg = document.getElementById('ccBg').value;
                document.getElementById('ccPreview').style.color = tc;
                document.getElementById('ccPreview').style.background = bg;
                const ratio = getContrastRatio(tc, bg);
                document.getElementById('ccRatio').textContent = ratio.toFixed(2) + ':1';
                document.getElementById('ccAA').textContent = ratio >= 4.5 ? '✅ Pass' : '❌ Fail';
                document.getElementById('ccAAA').textContent = ratio >= 7 ? '✅ Pass' : '❌ Fail';
            }
            function getContrastRatio(c1,c2){ const l1=getLuminance(c1),l2=getLuminance(c2); return (Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05); }
            function getLuminance(hex){ const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255; const toLin=c=>c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4); return 0.2126*toLin(r)+0.7152*toLin(g)+0.0722*toLin(b); }
            document.getElementById('ccText').oninput = update;
            document.getElementById('ccBg').oninput = update;
            update();
        }

        function flexboxTool(c) {
            c.innerHTML = `
                <div class="row">
                    <div><label>Justify</label><select id="fbj"><option>flex-start</option><option>center</option><option>flex-end</option><option>space-between</option><option>space-around</option></select></div>
                    <div><label>Align</label><select id="fba"><option>stretch</option><option>center</option><option>flex-start</option><option>flex-end</option></select></div>
                    <div><label>Direction</label><select id="fbd"><option>row</option><option>column</option></select></div>
                    <div><label>Wrap</label><select id="fbw"><option>nowrap</option><option>wrap</option></select></div>
                </div>
                <div id="fbContainer" style="display:flex;gap:8px;background:rgba(255,255,255,0.1);border-radius:10px;padding:16px;min-height:120px;margin-top:10px;">
                    <div style="background:#ff00ff;padding:12px;">1</div><div style="background:#00ffff;padding:12px;">2</div><div style="background:#39ff14;padding:12px;">3</div>
                </div>
                <label>CSS</label>
                <div class="output-box" id="fbCSS"></div>
                <button class="outline-btn" id="fbCopy">📋 Copy</button>`;
            function update() {
                const j=document.getElementById('fbj').value, a=document.getElementById('fba').value, d=document.getElementById('fbd').value, w=document.getElementById('fbw').value;
                const box = document.getElementById('fbContainer');
                box.style.justifyContent = j; box.style.alignItems = a; box.style.flexDirection = d; box.style.flexWrap = w;
                document.getElementById('fbCSS').textContent = `display: flex;\njustify-content: ${j};\nalign-items: ${a};\nflex-direction: ${d};\nflex-wrap: ${w};`;
            }
            ['fbj','fba','fbd','fbw'].forEach(id => document.getElementById(id).onchange = update);
            document.getElementById('fbCopy').onclick = () => copyText(document.getElementById('fbCSS').textContent);
            update();
        }

        function jsonTool(c) {
            c.innerHTML = `
                <textarea id="jsonIn" placeholder="Paste JSON here..."></textarea>
                <div class="row">
                    <button id="jsonFormat">✨ Format</button>
                    <button id="jsonMinify" class="outline-btn">🗜️ Minify</button>
                    <button id="jsonClear" class="outline-btn">Clear</button>
                </div>
                <div class="output-box" id="jsonOut"></div>
                <button class="outline-btn" id="jsonCopy">📋 Copy</button>`;
            document.getElementById('jsonFormat').onclick = () => {
                try { document.getElementById('jsonOut').textContent = JSON.stringify(JSON.parse(document.getElementById('jsonIn').value), null, 2); }
                catch(e) { document.getElementById('jsonOut').textContent = '❌ Invalid JSON'; }
            };
            document.getElementById('jsonMinify').onclick = () => {
                try { document.getElementById('jsonOut').textContent = JSON.stringify(JSON.parse(document.getElementById('jsonIn').value)); }
                catch(e) { document.getElementById('jsonOut').textContent = '❌ Invalid JSON'; }
            };
            document.getElementById('jsonClear').onclick = () => { document.getElementById('jsonIn').value = ''; document.getElementById('jsonOut').textContent = ''; };
            document.getElementById('jsonCopy').onclick = () => copyText(document.getElementById('jsonOut').textContent);
        }

        function cssMinTool(c) {
            c.innerHTML = `
                <textarea id="cssIn" placeholder="Paste CSS code..."></textarea>
                <button id="cssMinify">🗜️ Minify</button>
                <div class="output-box" id="cssOut"></div>
                <button class="outline-btn" id="cssCopy">📋 Copy</button>`;
            document.getElementById('cssMinify').onclick = () => {
                let css = document.getElementById('cssIn').value;
                css = css.replace(/\/\*[\s\S]*?\*\//g, '').replace(/\s+/g, ' ').replace(/\s*([{};:,>+~])\s*/g, '$1').replace(/;}/g, '}').trim();
                document.getElementById('cssOut').textContent = css;
                showToast('✅ Minified');
            };
            document.getElementById('cssCopy').onclick = () => copyText(document.getElementById('cssOut').textContent);
        }

        function jsMinTool(c) {
            c.innerHTML = `
                <textarea id="jsIn" placeholder="Paste JavaScript code..."></textarea>
                <button id="jsMinify">⚙️ Minify</button>
                <div class="output-box" id="jsOut"></div>
                <button class="outline-btn" id="jsCopy">📋 Copy</button>`;
            document.getElementById('jsMinify').onclick = () => {
                let js = document.getElementById('jsIn').value;
                js = js.replace(/\/\/.*$/gm, '').replace(/\/\*[\s\S]*?\*\//g, '').replace(/\s+/g, ' ').replace(/\s*([{}();,:])\s*/g, '$1').trim();
                document.getElementById('jsOut').textContent = js;
                showToast('✅ Minified');
            };
            document.getElementById('jsCopy').onclick = () => copyText(document.getElementById('jsOut').textContent);
        }

        function regexTool(c) {
            c.innerHTML = `
                <div class="row">
                    <div><label>Pattern</label><input type="text" id="regexPat" placeholder="Example: \\d{3}-\\d{4}"></div>
                    <div><label>Flags</label><select id="regexFlags"><option value="">None</option><option value="g">g</option><option value="gi">gi</option></select></div>
                </div>
                <label>Test String</label>
                <textarea id="regexStr" placeholder="Enter text to test..."></textarea>
                <div class="output-box" id="regexOut"></div>
                <div><strong id="regexCount">0</strong> matches</div>`;
            function test() {
                const p = document.getElementById('regexPat').value, f = document.getElementById('regexFlags').value, s = document.getElementById('regexStr').value;
                if (!p) { document.getElementById('regexOut').textContent = 'Enter a pattern'; return; }
                try {
                    const r = new RegExp(p, f);
                    const m = s.match(r);
                    document.getElementById('regexCount').textContent = m ? m.length : 0;
                    document.getElementById('regexOut').textContent = m ? m.map((x,i) => `Match ${i+1}: "${x}"`).join('\n') : 'No matches';
                } catch(e) { document.getElementById('regexOut').textContent = '❌ Invalid regex'; }
            }
            document.getElementById('regexPat').oninput = test;
            document.getElementById('regexFlags').onchange = test;
            document.getElementById('regexStr').oninput = test;
        }

        function diffTool(c) {
            c.innerHTML = `
                <div class="row">
                    <div><label>Original</label><textarea id="diffOrig" placeholder="Original text..."></textarea></div>
                    <div><label>Modified</label><textarea id="diffMod" placeholder="Modified text..."></textarea></div>
                </div>
                <div class="output-box" id="diffOut"></div>`;
            function run() {
                const o = document.getElementById('diffOrig').value, m = document.getElementById('diffMod').value;
                const oL = o.split('\n'), mL = m.split('\n');
                let r = '';
                for (let i = 0; i < Math.max(oL.length, mL.length); i++) {
                    const a = oL[i] || '', b = mL[i] || '';
                    if (a === b) r += `  ${a}\n`;
                    else { if (a) r += `- ${a}\n`; if (b) r += `+ ${b}\n`; }
                }
                document.getElementById('diffOut').innerHTML = r.split('\n').map(l => {
                    if (l.startsWith('- ')) return `<span style="color:#ff073a;">${l}</span>`;
                    if (l.startsWith('+ ')) return `<span style="color:#39ff14;">${l}</span>`;
                    return l;
                }).join('\n');
            }
            document.getElementById('diffOrig').oninput = run;
            document.getElementById('diffMod').oninput = run;
        }

        function passwordTool(c) {
            c.innerHTML = `
                <div class="row">
                    <div><label>Length</label><input type="number" id="pwLen" value="16" min="4" max="128"></div>
                    <div><button id="pwGen">🎲 Generate</button></div>
                </div>
                <label><input type="checkbox" id="pwUpper" checked> Uppercase</label>
                <label><input type="checkbox" id="pwLower" checked> Lowercase</label>
                <label><input type="checkbox" id="pwDigits" checked> Digits</label>
                <label><input type="checkbox" id="pwSymbols" checked> Symbols</label>
                <div class="output-box" id="pwOut" style="text-align:center;font-size:1.2rem;letter-spacing:2px;"></div>
                <button class="outline-btn" id="pwCopy">📋 Copy</button>
                <div><strong id="pwStrength">-</strong></div>`;
            function generate() {
                const len = +document.getElementById('pwLen').value || 16;
                let chars = '';
                if (document.getElementById('pwUpper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                if (document.getElementById('pwLower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
                if (document.getElementById('pwDigits').checked) chars += '0123456789';
                if (document.getElementById('pwSymbols').checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
                if (!chars) chars = 'abcdefghijklmnopqrstuvwxyz';
                let pw = '';
                const arr = new Uint32Array(len); crypto.getRandomValues(arr);
                for (let i = 0; i < len; i++) pw += chars[arr[i] % chars.length];
                document.getElementById('pwOut').textContent = pw;
                document.getElementById('pwStrength').textContent = len >= 16 && chars.length > 60 ? '🟢 Strong' : len >= 10 ? '🟡 Medium' : '🔴 Weak';
            }
            document.getElementById('pwGen').onclick = generate;
            document.getElementById('pwCopy').onclick = () => copyText(document.getElementById('pwOut').textContent);
            generate();
        }

        function hashTool(c) {
            c.innerHTML = `
                <textarea id="hashIn" placeholder="Enter text to hash..."></textarea>
                <div class="row">
                    <button id="hashSha256">SHA-256</button>
                    <button id="hashSha1" class="outline-btn">SHA-1</button>
                    <button id="hashMd5" class="outline-btn">MD5</button>
                </div>
                <label id="hashLabel">SHA-256 Hash</label>
                <div class="output-box" id="hashOut"></div>
                <button class="outline-btn" id="hashCopy">📋 Copy</button>`;
            async function generate(algo) {
                const input = document.getElementById('hashIn').value;
                document.getElementById('hashLabel').textContent = algo + ' Hash';
                if (!input) { document.getElementById('hashOut').textContent = 'Enter some text first'; return; }
                if (algo === 'MD5') { document.getElementById('hashOut').textContent = '⚠️ MD5 not available in browser (use SHA-256)'; return; }
                try {
                    const data = new TextEncoder().encode(input);
                    const hashBuffer = await crypto.subtle.digest(algo, data);
                    const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
                    document.getElementById('hashOut').textContent = hashHex;
                } catch(e) { document.getElementById('hashOut').textContent = 'Error: ' + e.message; }
            }
            document.getElementById('hashSha256').onclick = () => generate('SHA-256');
            document.getElementById('hashSha1').onclick = () => generate('SHA-1');
            document.getElementById('hashMd5').onclick = () => generate('MD5');
            document.getElementById('hashCopy').onclick = () => copyText(document.getElementById('hashOut').textContent);
            // auto example
            document.getElementById('hashIn').value = 'Hello, World!';
            generate('SHA-256');
        }

        // Start application
        renderHome();
    </script>
