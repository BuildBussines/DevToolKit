<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevToolKit Pro · Neon Developer Tools</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.7.6/dist/quagga.min.js">
    </script>
    <style>
        :root {
            --bg: #050510;
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-lime: #39ff14;
            --neon-yellow: #ffff00;
            --neon-orange: #ff6600;
            --card-bg: rgba(10, 10, 30, 0.8);
            --border: rgba(255, 255, 255, 0.15);
            --text: #e0e0ff;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at 50% 50%, #0a0a2e, #020210);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }
        #app {
            width: 100%;
            max-width: 960px;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            width: 100%;
            margin-top: 30px;
        }
        .cat-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
        }
        .cat-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px var(--neon-cyan), 0 0 60px rgba(255, 0, 255, 0.4);
        }
        .cat-card .icon {
            font-size: 3.5rem;
            filter: drop-shadow(0 0 10px var(--neon-cyan));
        }
        .cat-card h2 {
            margin: 10px 0 5px;
            font-size: 1.5rem;
            text-shadow: 0 0 8px var(--neon-cyan);
        }
        .cat-card p {
            font-size: 0.9rem;
            color: #aaa;
        }
        .back-btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            transition: 0.3s;
            text-shadow: 0 0 5px var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
        }
        .back-btn:hover {
            background: rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 25px var(--neon-cyan);
        }
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
            width: 100%;
        }
        .tool-item {
            background: rgba(20, 20, 40, 0.7);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .tool-item:hover {
            border-color: var(--neon-magenta);
            box-shadow: 0 0 20px var(--neon-magenta);
            transform: translateY(-3px);
        }
        .tool-item .emoji {

            filter: drop-shadow(0 0 6px var(--neon-magenta));
        }
        .tool-item h3 {
            margin: 8px 0 4px;
            font-size: 1rem;
        }
        .detail-card {
            background: rgba(15, 15, 35, 0.8);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.2);
        }
        textarea,
        input,

            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;

            font-family: monospace;
            margin: 8px 0;

        .outline-btn {

        .note-card:hover {

            border-radius: 12px;

            color: var(--neon-cyan);

        #floatingTimer {

        .flex-demo {

        .contrast-result {

        .contrast-pass {

        .diff-added {

        canvas {

        }
        .prompt-template-card:hover {

        }
        .prompt-template-card.selected {

        .prompt-template-card h4 {

<body>
    <div id="app"></div>
    <div id="floatingTimer" title="Click to return to timer">⏱ 00:00:00</div>
    <div id="toastContainer"></div>

    <script>
        const app = document.getElementById('app');
        const floatingTimerEl = document.getElementById('floatingTimer');
        let audioCtx = null;

        function getAudioContext() {
            if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }

        function playBeep() {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch (e) {}
        }
        const globalTimer = {
            running: false,
            remaining: 0,
            total: 0,
            interval: null,
            beepInterval: null,
            expired: false,
            startTime: 0,
            pausedRemaining: 0
        };

        function stopBeeping() {
            if (globalTimer.beepInterval) { clearInterval(globalTimer.beepInterval);
                globalTimer.beepInterval = null; }
        }

        function startBeeping() {
            stopBeeping();
            playBeep();
            globalTimer.beepInterval = setInterval(playBeep, 1000);
        }

        function updateGlobalTimerDisplay() {
            if (!globalTimer.running) return;
            const now = performance.now();
            const newRemaining = globalTimer.pausedRemaining - (now - globalTimer.startTime);
            if (newRemaining <= 0) {
                globalTimer.remaining = 0;
                globalTimer.running = false;
                globalTimer.expired = true;
                clearInterval(globalTimer.interval);
                globalTimer.interval = null;
                startBeeping();
                updateFloatingTimer();
                if (document.getElementById('tmDisplay')) {
                    document.getElementById('tmDisplay').textContent = '00:00:00';
                    document.getElementById('tmStart').textContent = '▶ Start';
                    document.getElementById('tmPause').disabled = true;
                }
                return;
            }
            globalTimer.remaining = newRemaining;
            if (floatingTimerEl.style.display !== 'none') {
                floatingTimerEl.textContent = '⏱ ' + formatTimeMS(newRemaining);
                floatingTimerEl.classList.remove('expired');
            }
            if (document.getElementById('tmDisplay')) {
                document.getElementById('tmDisplay').textContent = formatTimeMS(newRemaining);
            }
        }

        function startGlobalTimer(durationMs) {
            stopGlobalTimer(false);
            globalTimer.total = durationMs;
            globalTimer.remaining = durationMs;
            globalTimer.pausedRemaining = durationMs;
            globalTimer.running = true;
            globalTimer.expired = false;
            globalTimer.startTime = performance.now();
            stopBeeping();
            globalTimer.interval = setInterval(updateGlobalTimerDisplay, 200);
            updateFloatingTimer();
        }

        function pauseGlobalTimer() {
            if (!globalTimer.running) return;
            const now = performance.now();
            globalTimer.pausedRemaining = globalTimer.remaining - (now - globalTimer.startTime);
            if (globalTimer.pausedRemaining < 0) globalTimer.pausedRemaining = 0;
            globalTimer.running = false;
            globalTimer.remaining = globalTimer.pausedRemaining;
            clearInterval(globalTimer.interval);
            globalTimer.interval = null;
            stopBeeping();
            updateFloatingTimer();
        }

        function resumeGlobalTimer() {
            if (globalTimer.running || globalTimer.expired || globalTimer.remaining <= 0) return;
            globalTimer.running = true;
            globalTimer.startTime = performance.now();
            globalTimer.pausedRemaining = globalTimer.remaining;
            stopBeeping();
            globalTimer.interval = setInterval(updateGlobalTimerDisplay, 200);
            updateFloatingTimer();
        }

        function stopGlobalTimer(reset = true) {
            globalTimer.running = false;
            clearInterval(globalTimer.interval);
            globalTimer.interval = null;
            stopBeeping();
            if (reset) {
                globalTimer.remaining = 0;
                globalTimer.total = 0;
                globalTimer.expired = false;
                globalTimer.pausedRemaining = 0;
            }
            updateFloatingTimer();
        }

        function formatTimeMS(ms) {
            if (ms < 0) ms = 0;
            const totalSec = Math.ceil(ms / 1000);
            const hrs = Math.floor(totalSec / 3600),
                mins = Math.floor((totalSec % 3600) / 60),
                secs = totalSec % 60;
            return `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
        }

        function updateFloatingTimer() {
            const currentViewIsTimer = document.getElementById('tmDisplay') !== null;

            const inp = document.getElementById('b64Input'), out = document.getElementById('b64Output');

            document.getElementById('b64Copy').addEventListener('click', () => copyText(out.textContent));

        function rgbToHsl(r,g,b){ r/=255;g/=255;b/=255; const max=Math.max(r,g,b),min=Math.min(r,g,b); let h,s,l=(max+min)/2; if(max===min){h=s=0;}else{const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min); switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}} return[Math.round(h*360),Math.round(s*100),Math.round(l*100)]; }

        function getLuminance(hex){ const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255; const toLin=c=>c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4); return 0.2126*toLin(r)+0.7152*toLin(g)+0.0722*toLin(b); }

            document.getElementById('pwGen').addEventListener('click',()=>{let charset='';if(document.getElementById('pwUpper').checked)charset+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';if(document.getElementById('pwLower').checked)charset+='abcdefghijklmnopqrstuvwxyz';if(document.getElementById('pwDigits').checked)charset+='0123456789';if(document.getElementById('pwSymbols').checked)charset+='!@#$%^&*()';if(!charset)return;const pws=[];for(let j=0;j<(parseInt(document.getElementById('pwCount').value)||3);j++){let pw='';const bytes=new Uint8Array(parseInt(document.getElementById('pwLen').value)||16);crypto.getRandomValues(bytes);for(let i=0;i<bytes.length;i++)pw+=charset[bytes[i]%charset.length];pws.push(pw);}document.getElementById('pwOutput').textContent=pws.join('\n');});

        // ==================== STOPWATCH & TIMER ====================
        function stopwatchTimerTool(c) {
            c.innerHTML = `<div class="tab-bar"><button class="tab-btn active" data-tab="sw">⏱️ Stopwatch</button><button class="tab-btn" data-tab="tm">⏲️ Timer</button></div>
                <div id="swPanel"><div class="time-display" id="swDisplay">00:00:00.00</div>
                <div class="row"><button id="swStart">▶ Start</button><button id="swLap" class="outline-btn" disabled>🏁 Lap</button><button id="swReset" class="outline-btn">🔄 Reset</button></div><div class="lap-list" id="lapList"></div></div>
                <div id="tmPanel" style="display:none;"><div class="time-display" id="tmDisplay">00:00:00</div>
                <div class="row"><div><label>Hr</label><input type="number" id="tmHr" value="0" min="0"></div><div><label>Min</label><input type="number" id="tmMin" value="5" min="0"></div><div><label>Sec</label><input type="number" id="tmSec" value="0" min="0"></div></div>
                <div class="row"><button id="tmStart">▶ Start</button><button id="tmPause" class="outline-btn" disabled>⏸ Pause</button><button id="tmReset" class="outline-btn">🔄 Reset</button></div></div>`;
            // Tab switching
            c.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{c.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('swPanel').style.display=btn.dataset.tab==='sw'?'block':'none';document.getElementById('tmPanel').style.display=btn.dataset.tab==='tm'?'block':'none';}));
            // Stopwatch logic
            let swRunning=false,swStartTime=0,swElapsed=0,swInterval=null,lapCount=0;
            const swDisplay=document.getElementById('swDisplay'),lapList=document.getElementById('lapList');
            const formatSW=ms=>{const cs=Math.floor(ms/10)%100,s=Math.floor(ms/1000)%60,m=Math.floor(ms/60000)%60,h=Math.floor(ms/3600000);return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;};
            const updateSW=()=>{swDisplay.textContent=formatSW(swElapsed+(swRunning?performance.now()-swStartTime:0));};
            document.getElementById('swStart').addEventListener('click',function(){if(!swRunning){swRunning=true;swStartTime=performance.now();this.textContent='⏹ Stop';document.getElementById('swLap').disabled=false;swInterval=setInterval(updateSW,16);}else{swRunning=false;swElapsed+=performance.now()-swStartTime;this.textContent='▶ Start';document.getElementById('swLap').disabled=true;clearInterval(swInterval);updateSW();}});
            document.getElementById('swLap').addEventListener('click',()=>{lapCount++;const div=document.createElement('div');div.className='lap-item';div.innerHTML=`<span>Lap ${lapCount}</span><span>${formatSW(swElapsed+(swRunning?performance.now()-swStartTime:0))}</span>`;lapList.insertBefore(div,lapList.firstChild);});
            document.getElementById('swReset').addEventListener('click',()=>{swRunning=false;swElapsed=0;lapCount=0;clearInterval(swInterval);swDisplay.textContent='00:00:00.00';document.getElementById('swStart').textContent='▶ Start';document.getElementById('swLap').disabled=true;lapList.innerHTML='';});
            // Timer logic
            const tmDisplay=document.getElementById('tmDisplay'),tmStart=document.getElementById('tmStart'),tmPause=document.getElementById('tmPause'),tmReset=document.getElementById('tmReset');
            const getTimerMs=()=>((parseInt(document.getElementById('tmHr').value)||0)*3600+(parseInt(document.getElementById('tmMin').value)||0)*60+(parseInt(document.getElementById('tmSec').value)||0))*1000;
            const updateTimerUI=()=>{const rem=globalTimer.remaining;tmDisplay.textContent=formatTimeMS(rem);if(globalTimer.expired){tmStart.textContent='▶ Start';tmPause.disabled=true;}else if(globalTimer.running){tmStart.textContent='⏹ Stop';tmPause.disabled=false;}else{tmStart.textContent='▶ Start';tmPause.disabled=true;}};
            tmStart.addEventListener('click',()=>{if(globalTimer.running)pauseGlobalTimer();else if(globalTimer.expired){stopGlobalTimer(true);startGlobalTimer(getTimerMs());}else{if(globalTimer.remaining<=0)startGlobalTimer(getTimerMs());else resumeGlobalTimer();}updateTimerUI();});
            tmPause.addEventListener('click',()=>{pauseGlobalTimer();updateTimerUI();});
            tmReset.addEventListener('click',()=>{stopGlobalTimer(true);globalTimer.remaining=getTimerMs();tmDisplay.textContent=formatTimeMS(globalTimer.remaining);updateTimerUI();});
            updateTimerUI();
        }

        // ==================== NOTES ====================
        function notesTool(c) {
            function getNotes(){try{return JSON.parse(localStorage.getItem('devtoolkit_notes')||'[]');}catch(e){return[];}}
            function saveNotes(n){localStorage.setItem('devtoolkit_notes',JSON.stringify(n));}
            let notes=getNotes(),selectedId=null;
            function renderUI(){
                const list=document.getElementById('notesList'),editor=document.getElementById('noteEditor');
                list.innerHTML=notes.length?notes.sort((a,b)=>b.updatedAt-a.updatedAt).map(n=>`<div class="note-card ${n.id===selectedId?'selected':''}" data-id="${n.id}"><h4>${n.title||'Untitled'}</h4><div class="note-date">${new Date(n.updatedAt).toLocaleString()}</div><div class="note-preview">${n.content?n.content.slice(0,60):'Empty...'}</div></div>`).join(''):'<p style="color:#666;">No notes yet.</p>';
                if(selectedId&&notes.find(n=>n.id===selectedId)){const n=notes.find(n=>n.id===selectedId);document.getElementById('noteTitle').value=n.title;document.getElementById('noteContent').value=n.content;editor.style.display='block';document.getElementById('noteDelete').style.display='inline-block';}else{editor.style.display='none';document.getElementById('noteDelete').style.display='none';}
            }
            c.innerHTML=`<div class="row"><button id="newNoteBtn">➕ New Note</button><button id="noteDelete" class="danger-btn" style="display:none;">🗑️ Delete</button></div><div class="notes-list" id="notesList"></div><div id="noteEditor" style="display:none;"><label>Title</label><input id="noteTitle"><label>Content</label><textarea id="noteContent" style="min-height:150px;"></textarea><p style="color:#444;font-size:0.65rem;">💾 Auto-saves</p></div>`;
            document.getElementById('newNoteBtn').onclick=()=>{const n={id:Date.now().toString(36),title:'',content:'',createdAt:Date.now(),updatedAt:Date.now()};notes.push(n);selectedId=n.id;saveNotes(notes);renderUI();};
            document.getElementById('noteDelete').onclick=()=>{if(selectedId&&confirm('Delete?')){notes=notes.filter(n=>n.id!==selectedId);selectedId=notes.length?notes[notes.length-1].id:null;saveNotes(notes);renderUI();}};
            document.getElementById('notesList').addEventListener('click',e=>{const card=e.target.closest('.note-card');if(card){selectedId=card.dataset.id;renderUI();}});
            document.getElementById('noteTitle').addEventListener('input',()=>{const n=notes.find(n=>n.id===selectedId);if(n){n.title=document.getElementById('noteTitle').value;n.updatedAt=Date.now();saveNotes(notes);}});
            document.getElementById('noteContent').addEventListener('input',()=>{const n=notes.find(n=>n.id===selectedId);if(n){n.content=document.getElementById('noteContent').value;n.updatedAt=Date.now();saveNotes(notes);}});
            if(notes.length&&!selectedId)selectedId=notes.sort((a,b)=>b.updatedAt-a.updatedAt)[0].id;
            renderUI();
        }

        // ==================== TTS ====================
        function ttsTool(c) {
            c.innerHTML=`<label>Text to speak</label><textarea id="ttsText" style="min-height:130px;">Hello! This is the DevToolKit Pro text to speech tool.</textarea>
                <div class="row"><div><label>Rate: <span id="ttsRateVal">1.0</span>x</label><input type="range" id="ttsRate" min="0.1" max="3" step="0.1" value="1"></div></div>
                <div class="row"><button id="ttsSpeak">🔊 Speak</button><button id="ttsPause" class="outline-btn">⏸ Pause</button><button id="ttsStop" class="outline-btn">⏹ Stop</button></div>`;

        // ==================== UNIT CONVERTER ====================
        function unitConverterTool(c) {
            const cats={length:{units:[{id:'meter',name:'Meter',factor:1},{id:'kilometer',name:'Kilometer',factor:1000},{id:'mile',name:'Mile',factor:1609.344}]},weight:{units:[{id:'kilogram',name:'Kilogram',factor:1},{id:'gram',name:'Gram',factor:0.001},{id:'pound',name:'Pound',factor:0.453592}]}};
            c.innerHTML=`<div class="row"><div><label>Category</label><select id="ucCat">${Object.entries(cats).map(([k,v])=>`<option value="${k}">${k}</option>`).join('')}</select></div></div>
                <div class="converter-row"><div><label>Value</label><input type="number" id="ucInput" value="1"></div><div><label>From</label><select id="ucFrom"></select></div><div class="swap-icon" id="ucSwap">🔄</div><div><label>To</label><select id="ucTo"></select></div></div>
                <div class="result-badge" id="ucResult">--</div>`;
            const populate=()=>{const cat=cats[document.getElementById('ucCat').value];const opts=cat.units.map(u=>`<option value="${u.id}">${u.name}</option>`).join('');document.getElementById('ucFrom').innerHTML=opts;document.getElementById('ucTo').innerHTML=opts;if(cat.units.length>=2){document.getElementById('ucFrom').value=cat.units[0].id;document.getElementById('ucTo').value=cat.units[cat.units.length-1].id;}updateResult();};
            const updateResult=()=>{const val=parseFloat(document.getElementById('ucInput').value);if(isNaN(val))return;const cat=cats[document.getElementById('ucCat').value];const from=cat.units.find(u=>u.id===document.getElementById('ucFrom').value);const to=cat.units.find(u=>u.id===document.getElementById('ucTo').value);document.getElementById('ucResult').textContent=from&&to?((val*from.factor)/to.factor).toFixed(4)+' '+to.name:'--';};
            document.getElementById('ucCat').addEventListener('change',populate);
            document.getElementById('ucFrom').addEventListener('change',updateResult);
            document.getElementById('ucTo').addEventListener('change',updateResult);
            document.getElementById('ucInput').addEventListener('input',updateResult);
            document.getElementById('ucSwap').addEventListener('click',()=>{const t=document.getElementById('ucFrom').value;document.getElementById('ucFrom').value=document.getElementById('ucTo').value;document.getElementById('ucTo').value=t;updateResult();});
            populate();
        }

        // Wrap render functions for floating timer
        const _renderCategory=renderCategory;renderCategory=function(catId){_renderCategory(catId);updateFloatingTimer();};
        const _renderHome=renderHome;renderHome=function(){_renderHome();updateFloatingTimer();};
        const _renderTool=renderTool;renderTool=function(catId,toolId){_renderTool(catId,toolId);updateFloatingTimer();};

        renderHome();
    </script>
